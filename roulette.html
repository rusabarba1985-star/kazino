<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Roulette - Cartoon Pro</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Luckiest+Guy&display=swap');
        :root { 
            --bg: #000; --font: 'Luckiest Guy', cursive; 
            --spring: cubic-bezier(0.68, -0.6, 0.32, 1.6); 
            --soft: cubic-bezier(0.175, 0.885, 0.32, 1.275);
            --grey: #aaa; 
        }
        body, html { margin:0; padding:0; width:100%; height:100%; background:#000; color:#fff; font-family:var(--font); overflow:hidden; }
        
        /* ПЛЕНКА */
        .noise { position:fixed; inset:0; opacity:0.18; pointer-events:none; z-index:9000; background:url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.8' numOctaves='3'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E"); }
        #film-chaos { position: fixed; inset: 0; pointer-events: none; z-index: 9001; }
        .dust, .scratch { position: absolute; background: rgba(255,255,255,0.4); pointer-events: none; animation: fadeOut 0.8s forwards; }
        @keyframes fadeOut { 0% { opacity: 0.6; transform: scale(0.8); } 100% { opacity: 0; } }

        /* ЗАГРУЗКА */
        #loading-screen { position: fixed; inset: 0; background: #000; display: flex; flex-direction: column; justify-content: center; align-items: center; z-index: 10000; transition: opacity 0.5s; }
        .drawn-title { font-size: 4rem; text-align: center; line-height: 0.85; color: #fff; animation: title-jump 0.8s infinite var(--spring); -webkit-text-stroke: 2px #000; text-shadow: 4px 4px 0px #fff, 8px 8px 0px #333; }
        #bar-container { width: 220px; height: 14px; border: 4px solid #fff; border-radius: 15px; margin-top: 40px; overflow: hidden; background: #222; }
        #bar { height: 100%; width: 0%; background: #fff; }

        .roulette-top { display: flex; align-items: center; justify-content: center; height: 40%; transition: transform 0.8s var(--spring); }
        .roulette-top.away { transform: translateY(-150%); }
        .wheel-wrap { position: relative; width: 260px; height: 260px; border: 8px solid #fff; border-radius: 50%; background: #222; }
        #wheel { width: 100%; height: 100%; border-radius: 50%; background: url('wheel.png') no-repeat center; background-size: cover; transition: transform 5s cubic-bezier(0.15, 0, 0.15, 1); }
        .arrow { position: absolute; top: -15px; left: 50%; transform: translateX(-50%); width: 30px; height: 40px; background: #fff; clip-path: polygon(50% 100%, 0 0, 100% 0); z-index: 200; border: 2px solid #000; }

        .bet-board { position: absolute; bottom: 0; width: 100%; height: 75%; background: rgba(0,0,0,0.98); border-top: 6px solid #fff; border-radius: 30px 30px 0 0; transition: transform 0.6s var(--spring); transform: translateY(105%); z-index: 1000; display: flex; flex-direction: column; padding: 10px; box-sizing: border-box; }
        .bet-board.active { transform: translateY(10%); }

        .grid-layout { display: flex; gap: 4px; justify-content: center; transform-origin: top; margin-top: 10px; }
        @media (min-width: 1024px) { .grid-layout { transform: scale(1.1); } .bet-board.active { max-width: 450px; left: 50%; transform: translateX(-50%); border-left: 5px solid #fff; border-right: 5px solid #fff; } }
        
        .cell { border: 2px solid #fff; border-radius: 8px; display: flex; align-items: center; justify-content: center; font-size: 0.9rem; cursor: pointer; position: relative; height: 45px; }
        .cell.grey { background: var(--grey); color: #000; }
        .cell.black { background: #111; color: #fff; }
        
        /* КРАСИВАЯ ФИШКА НА ПОЛЕ */
        .cell.has-bet::after { 
            content: attr(data-sum); position: absolute; top: -10px; right: -10px; 
            width: 26px; height: 26px; background: #fff; color: #000; 
            border-radius: 50%; border: 2px solid #000; font-size: 9px; 
            display: flex; align-items: center; justify-content: center; 
            z-index: 10; font-weight: bold;
            box-shadow: inset 0 0 0 2px #fff, inset 0 0 0 3px #000;
        }

        .chip-main { width: 75px; height: 75px; border: 5px solid #fff; border-radius: 50%; background: #111; display: flex; align-items: center; justify-content: center; position: relative; cursor: pointer; }
        .chip-main::after { content: ''; position: absolute; inset: 0; border: 6px dashed #fff; border-radius: 50%; }
        
        /* ФИШКИ ВВЕРХ-ЛЕВО */
        .sub-chip { position: absolute; width: 55px; height: 55px; background: #222; border: 3px solid #fff; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 0.8rem; opacity: 0; transition: 0.5s var(--spring); transform: scale(0); pointer-events: none; }
        .chip-main.active .sub-chip { opacity: 1; transform: scale(1); pointer-events: auto; }

        .undo-btn { width: 45px; height: 45px; background: #fff; color: #000; border-radius: 50%; display: flex; align-items: center; justify-content: center; border: 3px solid #000; font-size: 1.5rem; cursor: pointer; }

        #roul-res { position: fixed; top: 40%; left: 50%; transform: translate(-50%, -50%) scale(0); background: #fff; color: #000; border: 8px solid #000; border-radius: 30px; padding: 20px; text-align: center; z-index: 5000; transition: 0.4s var(--spring); min-width: 200px; }
        #roul-res.show { transform: translate(-50%, -50%) scale(1); }
    </style>
</head>
<body onclick="startMus()">
    <div class="noise"></div>
    <div id="film-chaos"></div>
    <div id="loading-screen"><div class="drawn-title">CARTOON<br>GAME</div><div id="bar-container"><div id="bar"></div></div></div>

    <audio id="bgMusic" loop><source src="music2.mp3" type="audio/mpeg"></audio>
    <audio id="spinSound"><source src="soundroulet.mp3" type="audio/mpeg"></audio>

    <div id="roul-res"><div id="res-num" style="font-size:3rem;">?</div><div id="res-col" style="font-size:1rem;">-</div><div id="res-win" style="font-size:1.5rem; color:#0a0;"></div></div>

    <div class="game-screen">
        <div style="width:100%; display:flex; justify-content:space-between; padding:15px; box-sizing:border-box;">
            <div style="font-size:1.5rem;">$<span id="bal">1000.00</span></div>
            <div id="timer" style="color:#ff0; font-size:1.8rem;">15</div>
            <button style="background:none; border:3px solid #fff; color:#fff; border-radius:10px; font-family:var(--font);" onclick="window.location.href='index.html'">EXIT</button>
        </div>
        <div class="roulette-top" id="wheelArea"><div class="wheel-wrap"><div class="arrow"></div><div id="wheel"></div></div></div>
        <div class="bet-board active" id="betBoard">
            <div class="grid-layout">
                <div class="side-panel" style="display:grid; grid-template-rows: repeat(6, 1fr); gap:4px; width:65px;">
                    <div class="cell outside" data-target="1-18">1-18</div><div class="cell outside" data-target="even">EVEN</div><div class="cell outside grey" data-target="grey">GREY</div><div class="cell outside black" data-target="black">BLACK</div><div class="cell outside" data-target="odd">ODD</div><div class="cell outside" data-target="19-36">19-36</div>
                </div>
                <div style="display:flex; flex-direction:column; flex:1;"><div class="cell" data-target="0" style="background:#fff; color:#000; height:40px; border-radius:40% 40% 0 0;">0</div><div id="numGrid" style="display:grid; grid-template-columns: repeat(3, 1fr); gap:4px; flex:1;"></div></div>
            </div>
            <div style="display:flex; justify-content:center; align-items:center; gap:25px; margin-top:auto; padding-bottom:35px;">
                <div class="undo-btn" onclick="undo()">↩</div>
                <div class="chip-main" id="mainChip" onclick="this.classList.toggle('active')">
                    <span id="curBetTxt">$0.1</span>
                    <div class="sub-chip" style="left:-50px; top:-50px;" onclick="setBet(0.1)">.1</div>
                    <div class="sub-chip" style="left:-10px; top:-70px;" onclick="setBet(0.5)">.5</div>
                    <div class="sub-chip" style="left:30px; top:-50px;" onclick="setBet(1.0)">1</div>
                </div>
            </div>
        </div>
    </div>

    <script>
        let balance = parseFloat(localStorage.getItem('balance')) || 1000;
        let activeBets = [], betHistory = [], timer = 15, isRolling = false, curBet = 0.1, totalRot = 0;

        function startMus() { document.getElementById('bgMusic').play(); }
        function setBet(v) { curBet = v; document.getElementById('curBetTxt').innerText = '$' + v; }

        function init() {
            const grid = document.getElementById('numGrid');
            for(let i=1; i<=36; i++) {
                const c = document.createElement('div');
                c.className = `cell ${[1,3,5,7,9,12,14,16,18,19,21,23,25,27,30,32,34,36].includes(i) ? 'grey' : 'black'}`;
                c.innerText = i; c.dataset.target = i;
                c.onclick = () => placeBet(c); grid.appendChild(c);
            }
            document.querySelectorAll('.outside, [data-target="0"]').forEach(el => el.onclick = () => placeBet(el));
            startCycle(); updateUI();
        }

        function placeBet(el) {
            if(isRolling || timer <= 0 || activeBets.length >= 5 && !activeBets.find(b => b.target === el.dataset.target) || balance < curBet) return;
            balance -= curBet;
            let bet = activeBets.find(b => b.target === el.dataset.target);
            if(bet) bet.amount += curBet;
            else { bet = { target: el.dataset.target, amount: curBet, el }; activeBets.push(bet); el.classList.add('has-bet'); }
            el.setAttribute('data-sum', bet.amount.toFixed(1));
            betHistory.push({t: el.dataset.target, v: curBet}); updateUI();
        }

        function undo() {
            if(isRolling || betHistory.length === 0) return;
            const last = betHistory.pop();
            const bet = activeBets.find(b => b.target === last.t);
            balance += last.v; bet.amount -= last.v;
            if(bet.amount <= 0) { bet.el.classList.remove('has-bet'); activeBets = activeBets.filter(b => b.target !== last.t); }
            else bet.el.setAttribute('data-sum', bet.amount.toFixed(1));
            updateUI();
        }

        function startCycle() {
            timer = 15; document.getElementById('betBoard').classList.add('active');
            document.getElementById('wheelArea').classList.add('away');
            const t = setInterval(() => {
                timer--; document.getElementById('timer').innerText = timer;
                if(timer === 1) document.getElementById('wheelArea').classList.remove('away');
                if(timer <= 0) { clearInterval(t); document.getElementById('betBoard').classList.remove('active'); setTimeout(spin, 800); }
            }, 1000);
        }

        function spin() {
            isRolling = true; document.getElementById('spinSound').play();
            let resIdx = Math.random() < 0.01 ? 0 : Math.floor(Math.random() * 36) + 1;
            totalRot += (360 * 10) + (360 - (resIdx * (360/37)));
            document.getElementById('wheel').style.transform = `rotate(${totalRot}deg)`;
            setTimeout(() => {
                document.getElementById('spinSound').pause();
                const nums = [0, 32, 15, 19, 4, 21, 2, 25, 17, 34, 6, 27, 13, 36, 11, 30, 8, 23, 10, 5, 24, 16, 33, 1, 20, 14, 31, 9, 22, 18, 29, 7, 28, 12, 35, 3, 26];
                let n = nums[resIdx], col = n === 0 ? 'WHITE' : ([1,3,5,7,9,12,14,16,18,19,21,23,25,27,30,32,34,36].includes(n) ? 'GREY' : 'BLACK'), won = 0;
                activeBets.forEach(b => {
                    let m = 0;
                    if(b.target == n) m = n==0?20:10;
                    else if(b.target==='grey' && col==='GREY') m=2;
                    else if(b.target==='black' && col==='BLACK') m=2;
                    won += b.amount * m;
                });
                balance += won; document.getElementById('res-num').innerText = n;
                document.getElementById('res-col').innerText = col;
                document.getElementById('res-win').innerText = won > 0 ? `+$${won.toFixed(1)}` : "";
                document.getElementById('roul-res').classList.add('show'); updateUI();
                setTimeout(() => { document.getElementById('roul-res').classList.remove('show'); isRolling = false; activeBets.forEach(b => b.el.classList.remove('has-bet')); activeBets = []; startCycle(); }, 2000);
            }, 5000);
        }

        window.onload = () => {
            let p = 0;
            const l = setInterval(() => {
                p += 10; document.getElementById('bar').style.width = p + '%';
                if(p >= 100) { clearInterval(l); document.getElementById('loading-screen').style.opacity = '0'; setTimeout(() => { document.getElementById('loading-screen').style.display='none'; init(); }, 500); }
            }, 100);
        };
        function updateUI() { document.getElementById('bal').innerText = balance.toFixed(2); localStorage.setItem('balance', balance); }
        setInterval(() => {
            const c = document.getElementById('film-chaos');
            const d = document.createElement('div');
            d.className = Math.random() > 0.8 ? 'scratch' : 'dust';
            d.style.left = Math.random() * 100 + '%';
            if(d.className === 'dust') { d.style.top = Math.random() * 100 + '%'; d.style.width = d.style.height = (Math.random()*4+2)+'px'; }
            c.appendChild(d); setTimeout(()=>d.remove(), 800);
        }, 150);
    </script>
</body>
</html>
