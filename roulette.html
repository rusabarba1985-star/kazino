<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Roulette - Cartoon Pro Sync</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Luckiest+Guy&display=swap');
        :root { 
            --bg: #000; --font: 'Luckiest Guy', cursive; 
            --spring: cubic-bezier(0.68, -0.6, 0.32, 1.6); 
            --grey: #aaa; --white: #fff; 
        }
        body, html { margin:0; padding:0; width:100%; height:100%; background:#000; color:#fff; font-family:var(--font); overflow:hidden; }
        
        .noise { position:fixed; inset:0; opacity:0.1; pointer-events:none; z-index:5000; background:url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.8' numOctaves='3'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E"); }

        .game-screen { height: 100vh; display: flex; flex-direction: column; align-items: center; position: relative; }

        /* ВЕРХНЯЯ ЧАСТЬ С КОЛЕСОМ */
        .roulette-top { 
            display: flex; align-items: center; justify-content: center; 
            height: 40%; width: 100%; transition: transform 0.8s var(--spring);
            z-index: 5;
        }
        .roulette-top.away { transform: translateY(-150%); } /* Колесо улетает вверх */

        .wheel-wrap { 
            position: relative; 
            width: 350px; height: 350px; /* Увеличено в 1.5x */
            border-radius: 50%;
            overflow: visible;
        }
        #wheel { 
            width: 100%; height: 100%; 
            background-image: url('wheel.png'); 
            background-size: contain;
            background-repeat: no-repeat;
            background-position: center;
            border-radius: 50%;
            transition: transform 5s cubic-bezier(0.15, 0, 0.2, 1);
        }

        .arrow { 
            position: absolute; top: -10px; left: 50%; transform: translateX(-50%); 
            width: 40px; height: 50px; background: #fff; 
            clip-path: polygon(50% 100%, 0 0, 100% 0); z-index: 200; border: 2px solid #000; 
        }

        /* ПОЛЕ СТАВОК */
        .bet-board {
            position: absolute; bottom: 0; width: 100%; height: 60%; 
            background: rgba(0,0,0,0.98); border-top: 6px solid #fff; 
            border-radius: 40px 40px 0 0;
            transition: all 0.8s var(--spring); 
            z-index: 1000; display: flex; flex-direction: column; padding: 10px; box-sizing: border-box;
        }
        /* Поле на весь экран во время ставок */
        .bet-board.active { height: 92%; transform: translateY(0); }
        .bet-board.spring-out { transform: translateY(110%); }

        /* СЕТКА (Адаптация под ПК) */
        .grid-layout { display: flex; gap: 5px; justify-content: center; transform-origin: top; margin-top: 20px; }
        @media (min-width: 1024px) { .grid-layout { transform: scale(1.3); } }
        @media (max-width: 1023px) { .grid-layout { transform: scale(0.9); } }

        .side-bets { display: grid; grid-template-rows: repeat(6, 1fr); gap: 4px; width: 70px; }
        .cell { border: 2px solid #fff; border-radius: 8px; display: flex; align-items: center; justify-content: center; font-size: 0.9rem; cursor: pointer; position: relative; }
        .cell.grey { background: var(--grey); color: #000; }
        .cell.black { background: #111; color: #fff; }
        .cell.has-bet::after { content: attr(data-sum); position: absolute; inset: 0; margin: auto; width: 24px; height: 24px; background: #fff; color: #000; border-radius: 50%; font-size: 9px; display: flex; align-items: center; justify-content: center; border: 1px solid #000; font-weight: bold; }

        /* НОВАЯ СИСТЕМА ФИШЕК */
        .chip-main { 
            width: 80px; height: 80px; border: 5px solid #fff; border-radius: 50%; 
            background: #111; display: flex; align-items: center; justify-content: center; 
            position: relative; cursor: pointer; font-size: 1.1rem; z-index: 100;
        }
        .chip-main::after { content: ''; position: absolute; inset: 0; border: 6px dashed #fff; border-radius: 50%; }
        
        .sub-chip { 
            position: absolute; width: 55px; height: 55px; background: #222; border: 3px solid #fff; 
            border-radius: 50%; display: flex; align-items: center; justify-content: center; 
            font-size: 0.8rem; opacity: 0; transition: 0.5s var(--spring); transform: scale(0);
        }
        .chip-main.active .sub-chip { opacity: 1; transform: scale(1); }

        #roul-res { 
            position: fixed; top: 40%; left: 50%; transform: translate(-50%, -50%) scale(0); 
            background: #fff; color: #000; border: 8px solid #000; border-radius: 35px; 
            padding: 25px; text-align: center; z-index: 5000; transition: 0.4s var(--spring); min-width: 220px; 
        }
        #roul-res.show { transform: translate(-50%, -50%) scale(1); }
    </style>
</head>
<body onclick="document.getElementById('bgMusic').play()">
    <div class="noise"></div>
    <audio id="bgMusic" loop><source src="music2.mp3" type="audio/mpeg"></audio>
    <audio id="spinSound"><source src="soundroulet.mp3" type="audio/mpeg"></audio>

    <div id="roul-res">
        <div id="res-num" style="font-size:4rem;">?</div>
        <div id="res-col" style="font-size:1.1rem;">-</div>
        <div id="res-win" style="font-size:1.8rem; color:#0a0;"></div>
    </div>

    <div class="game-screen">
        <div style="width:100%; display:flex; justify-content:space-between; padding:15px; box-sizing:border-box; z-index: 2000;">
            <div style="font-size:1.6rem;">$<span id="bal">1000.00</span></div>
            <div id="timer" style="color:#ff0; font-size:2rem;">15</div>
            <button style="background:none; border:3px solid #fff; color:#fff; border-radius:10px; font-family:var(--font); cursor:pointer;" onclick="window.location.href='index.html'">BACK</button>
        </div>

        <!-- КОЛЕСО -->
        <div class="roulette-top" id="wheelArea">
            <div class="wheel-wrap">
                <div class="arrow"></div>
                <div id="wheel"></div>
            </div>
        </div>

        <!-- ПОЛЕ СТАВОК -->
        <div class="bet-board active" id="betBoard">
            <div class="grid-layout">
                <div class="side-bets">
                    <div class="cell outside" data-target="1-18">1to18</div>
                    <div class="cell outside" data-target="even">EVEN</div>
                    <div class="cell outside grey" data-target="grey">GREY</div>
                    <div class="cell outside black" data-target="black">BLACK</div>
                    <div class="cell outside" data-target="odd">ODD</div>
                    <div class="cell outside" data-target="19-36">19to36</div>
                </div>
                <div style="display:flex; flex-direction:column; flex:1;">
                    <div class="cell" data-target="0" style="background:#fff; color:#000; height:45px; border-radius:40% 40% 0 0; font-size: 1.5rem;">0</div>
                    <div id="numGrid" style="display:grid; grid-template-columns: repeat(3, 1fr); gap:4px; flex:1;"></div>
                </div>
            </div>
            
            <div style="display:flex; justify-content:center; align-items:center; gap:25px; margin-top:auto; padding-bottom:30px;">
                <div style="width:50px; height:50px; background:#fff; color:#000; border-radius:50%; display:flex; align-items:center; justify-content:center; border:4px solid #000; font-size:1.8rem; cursor:pointer;" onclick="undo()">↩</div>
                
                <!-- РАДИАЛЬНЫЙ ВЫБОР ФИШЕК -->
                <div class="chip-main" id="mainChip" onclick="this.classList.toggle('active')">
                    $0.1
                    <div class="sub-chip" style="left:-65px;" onclick="setBet(0.1)">0.1</div>
                    <div class="sub-chip" style="left:-130px;" onclick="setBet(0.5)">0.5</div>
                    <div class="sub-chip" style="left:-195px;" onclick="setBet(1.0)">1.0</div>
                </div>
            </div>
            <div style="text-align:center; font-size:0.7rem; color:#ffd966; padding-bottom:10px;">23 players won $133 last round</div>
        </div>
    </div>

    <script>
        let balance = parseFloat(localStorage.getItem('balance')) || 1000;
        let activeBets = [], betHistory = [], timer = 15, isRolling = false, curBet = 0.1, totalRot = 0;
        
        // Порядок чисел на стандартном колесе (по часовой)
        const nums = [0, 32, 15, 19, 4, 21, 2, 25, 17, 34, 6, 27, 13, 36, 11, 30, 8, 23, 10, 5, 24, 16, 33, 1, 20, 14, 31, 9, 22, 18, 29, 7, 28, 12, 35, 3, 26];

        function setBet(v) { curBet = v; document.getElementById('mainChip').childNodes[0].textContent = '$' + v; }

        function init() {
            const grid = document.getElementById('numGrid');
            for(let i=1; i<=36; i++) {
                const c = document.createElement('div');
                const reds = [1,3,5,7,9,12,14,16,18,19,21,23,25,27,30,32,34,36];
                c.className = `cell ${reds.includes(i) ? 'grey' : 'black'}`;
                c.innerText = i; c.dataset.target = i;
                c.onclick = () => placeBet(c);
                grid.appendChild(c);
            }
            document.querySelectorAll('.cell.outside, [data-target="0"]').forEach(el => el.onclick = () => placeBet(el));
            updateUI();
            startCycle();
        }

        function placeBet(el) {
            if(isRolling || timer <= 0 || activeBets.length >= 5 && !activeBets.find(b => b.target === el.dataset.target) || balance < curBet) return;
            balance -= curBet;
            let bet = activeBets.find(b => b.target === el.dataset.target);
            if(bet) bet.amount += curBet;
            else { bet = { target: el.dataset.target, amount: curBet, el }; activeBets.push(bet); el.classList.add('has-bet'); }
            el.setAttribute('data-sum', bet.amount.toFixed(1));
            betHistory.push({target: el.dataset.target, val: curBet});
            updateUI();
        }

        function undo() {
            if(isRolling || betHistory.length === 0) return;
            const last = betHistory.pop();
            const bet = activeBets.find(b => b.target === last.target);
            balance += last.val; bet.amount -= last.val;
            if(bet.amount <= 0) { bet.el.classList.remove('has-bet'); activeBets = activeBets.filter(b => b.target !== last.target); }
            else bet.el.setAttribute('data-sum', bet.amount.toFixed(1));
            updateUI();
        }

        function startCycle() {
            timer = 15;
            document.getElementById('betBoard').className = 'bet-board active';
            document.getElementById('wheelArea').className = 'roulette-top away'; // Колесо улетает
            
            const t = setInterval(() => {
                timer--;
                document.getElementById('timer').innerText = timer;
                
                if(timer === 1) {
                    document.getElementById('wheelArea').className = 'roulette-top'; // Возвращаем колесо за 1 сек
                }

                if(timer <= 0) {
                    clearInterval(t);
                    document.getElementById('betBoard').className = 'bet-board spring-out';
                    setTimeout(spin, 800);
                }
            }, 1000);
        }

        function spin() {
            isRolling = true;
            document.getElementById('spinSound').play();
            const wheel = document.getElementById('wheel');
            
            // Шанс 1/100 на Зеро
            let resIdx = Math.random() < 0.01 ? 0 : Math.floor(Math.random() * 36) + 1;
            
            // Расчет угла для синхронизации с картинкой
            // 360 / 37 ≈ 9.73 градуса на число
            totalRot += (360 * 10) + (360 - (resIdx * (360/37))); 
            wheel.style.transform = `rotate(${totalRot}deg)`;
            
            setTimeout(() => {
                document.getElementById('spinSound').pause();
                document.getElementById('spinSound').currentTime = 0;
                
                const n = nums[resIdx];
                const reds = [1,3,5,7,9,12,14,16,18,19,21,23,25,27,30,32,34,36];
                const col = n === 0 ? 'WHITE' : (reds.includes(n) ? 'GREY' : 'BLACK');
                
                let won = 0;
                activeBets.forEach(b => {
                    let m = 0;
                    if(b.target == n) m = (n == 0 ? 20 : 10);
                    else if(b.target==='even' && n%2===0 && n!==0) m=2;
                    else if(b.target==='odd' && n%2!==0) m=2;
                    else if(b.target==='grey' && col==='GREY') m=2;
                    else if(b.target==='black' && col==='BLACK') m=2;
                    won += b.amount * m;
                });

                balance += won;
                document.getElementById('res-num').innerText = n;
                document.getElementById('res-col').innerText = col;
                document.getElementById('res-win').innerText = won > 0 ? `+$${won.toFixed(1)}` : "";
                document.getElementById('roul-res').classList.add('show');
                updateUI();

                setTimeout(() => {
                    document.getElementById('roul-res').classList.remove('show');
                    isRolling = false;
                    activeBets.forEach(b => b.el.classList.remove('has-bet'));
                    activeBets = []; betHistory = [];
                    startCycle();
                }, 2000); 
            }, 5000);
        }

        function updateUI() { 
            document.getElementById('bal').innerText = balance.toFixed(2); 
            localStorage.setItem('balance', balance); 
        }
        window.onload = init;
    </script>
</body>
</html>
