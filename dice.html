<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Dice Game - Cartoon Noir Pro</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Luckiest+Guy&display=swap');
        :root { 
            --bg: #000; --text: #fff; --font-main: 'Luckiest Guy', cursive; 
            --spring: cubic-bezier(0.68, -0.6, 0.32, 1.6); 
            --soft-spring: cubic-bezier(0.175, 0.885, 0.32, 1.275); 
        }
        body { margin: 0; background: #000; color: #fff; font-family: var(--font-main); display: flex; justify-content: center; align-items: center; height: 100vh; overflow: hidden; }
        
        /* ГРЯЗНАЯ ПЛЕНКА ПОВЕРХ ВСЕГО */
        .noise { position: fixed; inset: 0; opacity: 0.18; pointer-events: none; z-index: 9000; background: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.8' numOctaves='3'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E"); }
        #film-chaos { position: fixed; inset: 0; pointer-events: none; z-index: 9001; }
        .dust, .scratch { position: absolute; background: rgba(255,255,255,0.4); pointer-events: none; animation: fadeOut 0.8s forwards; }
        .scratch { width: 1px; height: 100%; opacity: 0.3; }
        @keyframes fadeOut { 0% { opacity: 0.6; transform: scale(0.8); } 100% { opacity: 0; } }
        .vignette { position: fixed; inset: 0; background: radial-gradient(circle, transparent 20%, black 150%); z-index: 9002; pointer-events: none; }

        /* ОБЕРТКА ИГРЫ */
        .game-wrapper { display: flex; align-items: center; justify-content: center; gap: 10px; z-index: 10; width: 100%; max-width: 800px; padding: 0 10px; }
        
        /* ПЕРСОНАЖ (ГИФКА БЕЗ КВАДРАТА) */
        .char-gif { 
            width: 200px; /* Увеличено */
            height: auto; 
            object-fit: contain; 
            flex-shrink: 0; 
            filter: grayscale(1); 
            border: none; 
            background: none;
            display: block;
            pointer-events: none;
        }

        .modal-content { background: #000; border: 6px solid #fff; border-radius: 40px; flex: 1; padding: 25px 15px; text-align: center; position: relative; box-shadow: 0 10px 0 #333; }
        
        .dice-row { display: flex; align-items: center; justify-content: space-around; margin: 20px 0; }
        #the-dice { width: 85px; height: 85px; background: #fff; border-radius: 18px; border: 6px solid #000; color: #000; font-size: 3.5rem; display: flex; align-items: center; justify-content: center; box-shadow: 0 8px 0 #ccc; }
        
        .dice-anim { animation: dice-toss 1s var(--soft-spring) forwards; }
        @keyframes dice-toss { 
            0% { transform: translateY(0) rotate(0); } 
            30% { transform: translateY(-150px) rotate(180deg) scale(1.2); } 
            60% { transform: translateY(10px) rotate(300deg) scale(0.9, 1.1); } 
            100% { transform: translateY(0) rotate(360deg) scale(1); } 
        }

        /* ФИШКИ */
        .chip-main { width: 75px; height: 75px; border: 4px solid #fff; border-radius: 50%; background: #111; display: flex; align-items: center; justify-content: center; cursor: pointer; z-index: 100; position: relative; }
        .chip-main::after { content: ''; position: absolute; inset: 0; border: 6px dashed #fff; border-radius: 50%; }
        
        .sub-chips-wrapper { position: absolute; inset: 0; display: flex; align-items: center; justify-content: center; pointer-events: none; }
        .sub-chip { 
            position: absolute; width: 55px; height: 55px; background: #222; border: 3px solid #fff; border-radius: 50%; 
            display: flex; align-items: center; justify-content: center; font-size: 0.8rem; 
            opacity: 0; transition: all 0.6s var(--spring); transform: scale(0); z-index: 50; 
        }
        .active .sub-chip { opacity: 1; transform: scale(1); pointer-events: auto; }

        .bets-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 6px; margin: 15px 0; }
        .bet-btn { background: #000; border: 3px solid #fff; color: #fff; padding: 8px 0; border-radius: 12px; font-family: var(--font-main); cursor: pointer; font-size: 0.85rem; }
        .bet-btn.selected { background: #fff; color: #000; }
        .btn-cartoon { background: #000; color: #fff; border: 5px solid #fff; padding: 10px 20px; font-family: var(--font-main); font-size: 1rem; border-radius: 20px; cursor: pointer; text-transform: uppercase; width: 100%; box-shadow: 0 5px 0 #333; }

        #res-pop { position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%) scale(0); background: #fff; border: 8px solid #000; border-radius: 35px; padding: 25px; z-index: 9500; text-align: center; color: #000; transition: 0.6s var(--spring); width: 240px; pointer-events: none; }
        #res-pop.show { transform: translate(-50%, -50%) scale(1); }
        #res-pop img { width: 150px; height: 150px; border: 5px solid #000; border-radius: 20px; object-fit: cover; margin-bottom: 15px; }
        
        .bal-display { position: absolute; top: 20px; left: 20px; font-size: 1.5rem; text-shadow: 2px 2px 0 #333; z-index: 100; }

        @media (max-width: 600px) {
            .game-wrapper { flex-direction: column; }
            .char-gif { width: 150px; }
        }
    </style>
</head>
<body onclick="startMusic()">
    <!-- Слой пленки -->
    <div class="noise"></div>
    <div id="film-chaos"></div>
    <div class="vignette"></div>

    <audio id="bgMusic" loop preload="auto"><source src="music2.mp3" type="audio/mpeg"></audio>
    <audio id="diceSound" preload="auto"><source src="sounddice.mp3" type="audio/mpeg"></audio>

    <div class="bal-display">$ <span id="bal">1000.00</span></div>

    <div class="game-wrapper">
        <!-- Персонаж без фона и рамок -->
        <img src="dicechar.gif" class="char-gif" alt="">

        <div class="modal-content">
            <h2 style="margin:0; font-size: 1.8rem; letter-spacing: 2px;">LUCKY DICE</h2>
            <div class="dice-row">
                <div id="the-dice">?</div>
                <div style="position:relative;">
                    <div class="chip-main" id="mainChip"><span>$0.1</span></div>
                    <div class="sub-chips-wrapper" id="radialChips">
                        <div class="sub-chip" data-val="0.1">$0.1</div>
                        <div class="sub-chip" data-val="0.5">$0.5</div>
                        <div class="sub-chip" data-val="1">$1</div>
                        <div class="sub-chip" data-val="5">$5</div>
                        <div class="sub-chip" data-val="10">$10</div>
                    </div>
                </div>
            </div>
            <div class="bets-grid">
                <button class="bet-btn" data-bet="even">EVEN</button>
                <button class="bet-btn" data-bet="odd">ODD</button>
                <button class="bet-btn" data-bet="1">1</button>
                <button class="bet-btn" data-bet="2">2</button>
                <button class="bet-btn" data-bet="3">3</button>
                <button class="bet-btn" data-bet="4">4</button>
                <button class="bet-btn" data-bet="5">5</button>
                <button class="bet-btn" data-bet="6">6</button>
            </div>
            <button class="btn-cartoon" onclick="window.location.href='index.html'">EXIT</button>
        </div>
    </div>

    <div id="res-pop">
        <img id="res-img" src="" alt="">
        <div id="res-txt" style="font-size: 1.8rem;">YOU WIN!</div>
    </div>

    <script>
        let balance = parseFloat(localStorage.getItem('balance')) || 1000;
        let betValue = 0.1, isRolling = false, musicStarted = false;

        function startMusic() {
            if(!musicStarted) {
                const m = document.getElementById('bgMusic');
                m.volume = 0.4; m.play(); musicStarted = true;
            }
        }

        const mainChip = document.getElementById('mainChip');
        const radial = document.getElementById('radialChips');
        
        mainChip.onclick = () => {
            if(isRolling) return;
            const isActive = radial.classList.toggle('active');
            const chips = radial.querySelectorAll('.sub-chip');
            chips.forEach((c, i) => {
                const angle = 110 + (i * 35); 
                const dist = isActive ? 135 : 0;
                const x = Math.cos(angle * Math.PI / 180) * dist;
                const y = Math.sin(angle * Math.PI / 180) * dist;
                c.style.transform = `translate(${x}px, ${y}px) scale(${isActive?1:0})`;
            });
        };

        radial.querySelectorAll('.sub-chip').forEach(sc => {
            sc.onclick = (e) => {
                e.stopPropagation();
                betValue = parseFloat(sc.dataset.val);
                mainChip.querySelector('span').innerText = '$' + betValue;
                radial.classList.remove('active');
                radial.querySelectorAll('.sub-chip').forEach(c => c.style.transform = 'translate(0,0) scale(0)');
            };
        });

        document.querySelectorAll('.bet-btn').forEach(btn => {
            btn.onclick = () => {
                if(isRolling || balance < betValue) return;
                isRolling = true;
                
                const snd = document.getElementById('diceSound');
                snd.currentTime = 0; snd.play();

                const type = btn.dataset.bet;
                const dice = document.getElementById('the-dice');
                dice.classList.add('dice-anim');

                let shuffle = setInterval(() => {
                    dice.innerText = Math.floor(Math.random() * 6) + 1;
                }, 80);

                const win = Math.random() < (isNaN(type) ? 0.4 : 0.2);
                let finalRes;
                if(win) finalRes = (type === 'even') ? [2,4,6][Math.floor(Math.random()*3)] : (type === 'odd' ? [1,3,5][Math.floor(Math.random()*3)] : parseInt(type));
                else {
                    do { finalRes = Math.floor(Math.random()*6)+1; } 
                    while((type === 'even' && finalRes % 2 === 0) || (type === 'odd' && finalRes % 2 !== 0) || (type == finalRes));
                }

                // БРОСОК 1 СЕКУНДА
                setTimeout(() => {
                    clearInterval(shuffle);
                    snd.pause(); 
                    dice.classList.remove('dice-anim');
                    dice.innerText = finalRes;
                    balance -= betValue;
                    if(win) balance += betValue * (isNaN(type) ? 2 : 3.5);
                    localStorage.setItem('balance', balance.toFixed(2));
                    updateUI();
                    showResult(win);
                }, 1000);
            };
        });

        function updateUI() {
            document.getElementById('bal').innerText = parseFloat(balance).toFixed(2);
        }

        function showResult(win) {
            const pop = document.getElementById('res-pop');
            document.getElementById('res-img').src = win ? "Dicewin.gif" : "Dicelose.gif";
            document.getElementById('res-txt').innerText = win ? "YOU WIN!" : "NO LUCK!";
            pop.classList.add('show');
            setTimeout(() => { pop.classList.remove('show'); isRolling = false; }, 2200);
        }

        // ЭФФЕКТ ПЛЕНКИ
        setInterval(() => {
            const c = document.getElementById('film-chaos');
            const d = document.createElement('div');
            d.className = Math.random() > 0.85 ? 'scratch' : 'dust';
            d.style.left = Math.random() * 100 + '%';
            if(d.className === 'dust') {
                d.style.top = Math.random() * 100 + '%';
                d.style.width = d.style.height = (Math.random()*5+2)+'px';
            }
            c.appendChild(d); setTimeout(()=>d.remove(), 800);
        }, 150);

        updateUI();
    </script>
</body>
</html>
