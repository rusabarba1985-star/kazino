<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cartoon Game</title>
    <!-- Подключаем шрифт максимально похожий на шрифт с картинки -->
    <link href="https://googleapis.com" rel="stylesheet">
    <style>
        :root { --bg-color: #000; --text-color: #fff; }
        
        body, html { 
            margin: 0; padding: 0; width: 100%; height: 100%; 
            background: var(--bg-color); color: var(--text-color); 
            font-family: 'Limelight', cursive; overflow: hidden; 
        }

        /* КНОПКА ЗАПУСКА (ОБЯЗАТЕЛЬНО ДЛЯ МУЗЫКИ) */
        #start-overlay {
            position: fixed; inset: 0; background: #000; z-index: 1000;
            display: flex; justify-content: center; align-items: center;
            cursor: pointer;
        }
        #start-overlay span { border: 2px solid #fff; padding: 10px 20px; font-size: 1.5rem; }

        /* ЭФФЕКТЫ ГРЯЗНОЙ ПЛЕНКИ (МЕРЦАНИЕ) */
        .noise { position: fixed; inset: 0; opacity: 0.1; pointer-events: none; z-index: 500; background: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://w3.org id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.7' numOctaves='4'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E"); }
        #film-chaos { position: fixed; inset: 0; pointer-events: none; z-index: 450; }
        .dust { position: absolute; background: #fff; border-radius: 50%; opacity: 0.6; }
        .scratch { position: absolute; background: rgba(255,255,255,0.3); width: 2px; height: 100%; }
        .vignette { position: fixed; inset: 0; background: radial-gradient(circle, transparent 40%, black 150%); z-index: 510; pointer-events: none; }

        /* ЭКРАН ЗАГРУЗКИ */
        #loading-screen { 
            display: none; position: fixed; inset: 0; 
            flex-direction: column; justify-content: center; align-items: center; z-index: 100; 
        }
        .title { 
            font-size: 3.5rem; text-align: center; text-transform: uppercase; 
            margin: 0; line-height: 0.85; letter-spacing: -2px;
            animation: rubber-jump 1s infinite ease-in-out;
            text-shadow: 2px 2px 0px #333;
        }
        .bar-container { width: 200px; height: 6px; background: #222; margin-top: 50px; }
        #bar { width: 0%; height: 100%; background: #fff; }

        /* ГЛАВНОЕ МЕНЮ */
        #main-menu { display: none; width: 100%; height: 100%; position: relative; z-index: 50; }
        .avatar { 
            position: absolute; top: 20px; right: 20px; 
            width: 60px; height: 60px; border: 3px solid #fff; 
            border-radius: 50%; overflow: hidden; background: #111;
        }
        .avatar img { width: 100%; height: 100%; object-fit: cover; }

        @keyframes rubber-jump {
            0%, 100% { transform: scale(1) translateY(0); }
            50% { transform: scaleY(1.15) scaleX(0.9) translateY(-25px); }
        }
    </style>
</head>
<body>

    <div id="start-overlay" onclick="startApp()"><span>START GAME</span></div>

    <div class="noise"></div>
    <div class="vignette"></div>
    <div id="film-chaos"></div>

    <div id="loading-screen">
        <h1 class="title">CARTOON<br>GAME</h1>
        <div class="bar-container"><div id="bar"></div></div>
    </div>

    <div id="main-menu">
        <div class="avatar"><img id="ava" src="" alt=""></div>
    </div>

    <!-- Музыка -->
    <audio id="audio" loop><source src="music.mp3" type="audio/mpeg"></audio>

    <script src="https://telegram.org"></script>
    <script>
        const tg = window.Telegram.WebApp;
        tg.expand();

        const audio = document.getElementById('audio');
        const film = document.getElementById('film-chaos');
        const bar = document.getElementById('bar');

        // 1. ЗАПУСК ПРИЛОЖЕНИЯ ПО КЛИКУ
        function startApp() {
            document.getElementById('start-overlay').style.display = 'none';
            document.getElementById('loading-screen').style.display = 'flex';
            audio.play().catch(e => console.log("Музыка заблокирована:", e));
            runLoading();
        }

        // 2. ГРЯЗНАЯ ПЛЕНКА (РИТМ 1 СЕК)
        function triggerChaos() {
            film.innerHTML = '';
            for(let i=0; i<6; i++) {
                const d = document.createElement('div');
                d.className = 'dust';
                const s = Math.random()*7+2;
                d.style.cssText = `width:${s}px;height:${s}px;left:${Math.random()*100}%;top:${Math.random()*100}%`;
                film.appendChild(d);
            }
            const sc = document.createElement('div');
            sc.className = 'scratch';
            sc.style.left = Math.random()*100+'%';
            film.appendChild(sc);
            setTimeout(() => { film.innerHTML = ''; }, 100);
        }
        setInterval(triggerChaos, 1000);

        // 3. ЗАГРУЗКА (7 СЕКУНД)
        function runLoading() {
            let p = 0;
            const interval = setInterval(() => {
                p += 1.43; 
                bar.style.width = p + '%';
                if (p >= 100) {
                    clearInterval(interval);
                    showMenu();
                }
            }, 100);
        }

        function showMenu() {
            audio.pause(); // Музыка стоп
            document.getElementById('loading-screen').style.display = 'none';
            document.getElementById('main-menu').style.display = 'block';

            // Аватарка
            const img = document.getElementById('ava');
            const user = tg.initDataUnsafe?.user;
            
            if (user && user.photo_url) {
                img.src = user.photo_url;
            } else {
                // Если нет в TG, берем 1, 2 или 3.png
                let savedAva = localStorage.getItem('userAva');
                if(!savedAva) {
                    savedAva = Math.floor(Math.random() * 3) + 1 + '.png';
                    localStorage.setItem('userAva', savedAva);
                }
                img.src = savedAva;
            }
        }
    </script>
</body>
</html>
