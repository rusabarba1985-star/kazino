<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Бесконечные слоты 5x7</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            user-select: none;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background: linear-gradient(135deg, #1a1a2e, #16213e);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 10px;
        }
        
        .game-container {
            max-width: 500px;
            width: 100%;
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            border-radius: 30px;
            padding: 20px;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            border: 1px solid rgba(255, 255, 255, 0.2);
        }
        
        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
            color: white;
        }
        
        .balance {
            background: rgba(0, 0, 0, 0.4);
            padding: 12px 20px;
            border-radius: 40px;
            font-size: 20px;
            font-weight: bold;
            border: 1px solid rgba(255, 215, 0, 0.3);
            box-shadow: 0 0 15px rgba(255, 215, 0, 0.2);
        }
        
        .stats {
            background: rgba(255, 255, 255, 0.1);
            padding: 8px 15px;
            border-radius: 40px;
            font-size: 14px;
        }
        
        .slot-machine {
            background: #0f3460;
            border-radius: 30px;
            padding: 20px;
            border: 3px solid #e94560;
            box-shadow: inset 0 0 20px rgba(0, 0, 0, 0.5), 0 10px 20px rgba(233, 69, 96, 0.3);
        }
        
        .grid {
            display: grid;
            grid-template-columns: repeat(7, 1fr);
            gap: 5px;
            aspect-ratio: 7/5;
        }
        
        .cell {
            background: #1a1a2e;
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 24px;
            font-weight: bold;
            aspect-ratio: 1;
            border: 2px solid #0ff;
            box-shadow: 0 0 10px rgba(0, 255, 255, 0.3);
            transition: all 0.1s ease;
            color: white;
            text-shadow: 0 0 5px currentColor;
        }
        
        .cell.win {
            border-color: gold;
            box-shadow: 0 0 20px gold;
            transform: scale(1.05);
        }
        
        .cell.makvin {
            background: linear-gradient(45deg, #ffd700, #ffa500);
            color: black;
            border-color: white;
        }
        
        .controls {
            display: flex;
            gap: 10px;
            margin-top: 20px;
        }
        
        button {
            flex: 1;
            background: linear-gradient(45deg, #e94560, #0f3460);
            border: none;
            padding: 15px;
            border-radius: 50px;
            color: white;
            font-size: 18px;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.2s;
            border: 1px solid rgba(255, 255, 255, 0.2);
            text-transform: uppercase;
            letter-spacing: 1px;
        }
        
        button:active {
            transform: scale(0.95);
        }
        
        button:disabled {
            opacity: 0.5;
            pointer-events: none;
        }
        
        .win-message {
            text-align: center;
            margin-top: 15px;
            font-size: 24px;
            font-weight: bold;
            color: gold;
            text-shadow: 0 0 10px orange;
            min-height: 40px;
        }
        
        .bet-info {
            text-align: center;
            color: #aaa;
            margin-top: 10px;
            font-size: 14px;
        }
        
        @media (max-width: 450px) {
            .cell {
                font-size: 18px;
            }
        }
    </style>
</head>
<body>
    <div class="game-container">
        <div class="header">
            <div class="balance">💰 <span id="balance">10000</span></div>
            <div class="stats">🎰 <span id="games">0</span>/100</div>
        </div>
        
        <div class="slot-machine">
            <div class="grid" id="slot-grid">
                <!-- Ячейки будут созданы через JS -->
            </div>
        </div>
        
        <div class="win-message" id="win-message"></div>
        
        <div class="controls">
            <button id="spin-btn" class="spin-btn">🎰 Крутить (100)</button>
            <button id="reset-btn">🔄 Сброс</button>
        </div>
        
        <div class="bet-info">
            ⚡ Бесконечные деньги • Маквин заменяет любой символ • 7+ одинаковых = выигрыш
        </div>
    </div>
    
    <script src="game.js"></script>
</body>
</html>
