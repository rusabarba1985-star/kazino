<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Cartoon Game - Rubber Hose Style</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            user-select: none;
        }
        
        body, html { 
            width: 100%; 
            height: 100%; 
            background: #000;
            overflow: hidden;
        }

        /* ОСНОВНОЙ ЭКРАН */
        .screen {
            position: relative;
            width: 100%;
            height: 100%;
            background: #000;
            overflow: hidden;
        }

        /* СТИЛЬ RUBBER HOSE ДЛЯ ТЕКСТА */
        .rubber-text {
            font-family: 'Impact', 'Bangers', 'Fredoka One', 'Courier New', cursive;
            font-weight: 900;
            text-transform: uppercase;
            color: white;
            text-shadow: 5px 5px 0px #3a3a3a;
            letter-spacing: 2px;
        }

        /* ЗАГРУЗКА */
        #loading-screen { 
            position: fixed; 
            inset: 0; 
            display: flex; 
            flex-direction: column; 
            justify-content: center; 
            align-items: center; 
            z-index: 100; 
            background: #000;
        }
        
        .title { 
            font-size: 4rem; 
            text-align: center; 
            font-family: 'Impact', 'Bangers', 'Fredoka One', cursive;
            font-weight: 900;
            text-transform: uppercase;
            color: white;
            text-shadow: 6px 6px 0px #3a3a3a;
            animation: rubber-shake 0.8s infinite ease-in-out;
            letter-spacing: 4px;
        }
        
        .bar-wrap { 
            width: 200px; 
            height: 4px; 
            background: #222; 
            margin-top: 40px;
        }
        #bar { 
            width: 0%; 
            height: 100%; 
            background: #fff; 
            transition: width 0.1s linear;
            box-shadow: 0 0 5px #fff;
        }

        /* МЕНЮ */
        #main-menu { 
            display: none; 
            width: 100%; 
            height: 100%; 
            position: relative; 
            z-index: 50;
        }
        
        .avatar { 
            position: absolute; 
            top: 20px; 
            right: 20px; 
            width: 60px; 
            height: 60px; 
            border: 3px solid #fff; 
            border-radius: 50%; 
            overflow: hidden; 
            background: #111;
            cursor: pointer;
            transition: transform 0.2s ease;
            z-index: 10;
            box-shadow: 3px 3px 0px #3a3a3a;
        }
        
        .avatar:hover {
            transform: scale(1.05);
        }
        
        .avatar img { 
            width: 100%; 
            height: 100%; 
            object-fit: cover; 
        }
        
        /* КНОПКИ МЕНЮ - RUBBER HOSE СТИЛЬ */
        .menu-buttons {
            position: absolute;
            bottom: 40px;
            left: 0;
            right: 0;
            display: flex;
            justify-content: center;
            gap: 20px;
            flex-wrap: wrap;
            padding: 0 20px;
            z-index: 10;
        }
        
        .menu-btn {
            background: transparent;
            border: none;
            font-family: 'Impact', 'Bangers', 'Fredoka One', cursive;
            font-size: 1.2rem;
            font-weight: 900;
            text-transform: uppercase;
            color: white;
            text-shadow: 3px 3px 0px #3a3a3a;
            cursor: pointer;
            transition: all 0.2s ease;
            padding: 8px 0;
            letter-spacing: 2px;
        }
        
        .menu-btn:hover {
            transform: scale(1.1);
            text-shadow: 4px 4px 0px #3a3a3a;
            letter-spacing: 3px;
        }
        
        /* ПРОФИЛЬ - RUBBER HOSE СТИЛЬ */
        .profile-modal {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.98);
            z-index: 1000;
            display: none;
            justify-content: center;
            align-items: center;
        }
        
        .profile-content {
            background: #000;
            border: 3px solid #fff;
            padding: 30px;
            max-width: 400px;
            width: 85%;
            text-align: center;
            box-shadow: 10px 10px 0px #3a3a3a;
        }
        
        .profile-avatar {
            width: 100px;
            height: 100px;
            border-radius: 50%;
            margin: 0 auto 20px;
            border: 3px solid #fff;
            cursor: pointer;
            transition: transform 0.2s ease;
            background: #111;
            box-shadow: 5px 5px 0px #3a3a3a;
        }
        
        .profile-avatar:hover {
            transform: scale(1.05);
        }
        
        .profile-avatar img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            border-radius: 50%;
        }
        
        .profile-name {
            font-family: 'Impact', 'Bangers', 'Fredoka One', cursive;
            font-size: 1.8rem;
            font-weight: 900;
            margin-bottom: 10px;
            text-shadow: 3px 3px 0px #3a3a3a;
            color: white;
        }
        
        .profile-id {
            font-family: monospace;
            font-size: 0.9rem;
            color: #aaa;
            margin-bottom: 20px;
        }
        
        .profile-stats {
            text-align: left;
            margin: 20px 0;
            padding: 15px;
            background: #111;
            border: 1px solid #333;
        }
        
        .stat-item {
            display: flex;
            justify-content: space-between;
            padding: 10px 0;
            border-bottom: 1px solid #333;
            font-family: monospace;
        }
        
        .stat-label {
            font-weight: bold;
            color: #ccc;
        }
        
        .stat-value {
            font-weight: 900;
            color: #ffd966;
            font-family: monospace;
        }
        
        .close-profile {
            background: transparent;
            border: 2px solid #fff;
            color: white;
            padding: 10px 30px;
            margin-top: 20px;
            cursor: pointer;
            font-family: 'Impact', 'Bangers', 'Fredoka One', cursive;
            font-size: 1.2rem;
            text-transform: uppercase;
            transition: all 0.2s ease;
        }
        
        .close-profile:hover {
            background: rgba(255,255,255,0.1);
            transform: scale(1.05);
        }
        
        /* ЭФФЕКТЫ ПЛЕНКИ - РЕЗКИЕ ПОЯВЛЕНИЯ И ИСЧЕЗНОВЕНИЯ */
        #film-chaos { 
            position: fixed; 
            inset: 0; 
            pointer-events: none; 
            z-index: 450; 
        }
        
        .dust-flash {
            position: absolute;
            background: #fff;
            border-radius: 50%;
            width: 4px;
            height: 4px;
            pointer-events: none;
        }
        
        .scratch-flash {
            position: absolute;
            background: #fff;
            width: 2px;
            height: 100%;
            pointer-events: none;
        }
        
        .stripe-flash {
            position: absolute;
            background: #fff;
            width: 4px;
            height: 100%;
            top: 0;
            pointer-events: none;
        }
        
        .full-flash {
            position: fixed;
            inset: 0;
            background: rgba(255,255,255,0.15);
            pointer-events: none;
            z-index: 520;
        }
        
        .vignette { 
            position: fixed; 
            inset: 0; 
            background: radial-gradient(circle, transparent 40%, black 150%); 
            z-index: 510; 
            pointer-events: none; 
        }
        
        .noise { 
            position: fixed; 
            inset: 0; 
            opacity: 0.05; 
            pointer-events: none; 
            z-index: 500; 
            background: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.8' numOctaves='3'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E"); 
        }
        
        .version {
            position: fixed;
            bottom: 5px;
            right: 5px;
            font-size: 8px;
            color: rgba(255,255,255,0.3);
            z-index: 600;
            font-family: monospace;
        }

        @keyframes rubber-shake { 
            0%, 100% { transform: scale(1) translateY(0); } 
            50% { transform: scaleY(1.08) scaleX(0.96) translateY(-12px); } 
        }
        
        @media (max-width: 768px) {
            .title { font-size: 2.5rem; }
            .menu-btn { font-size: 0.8rem; letter-spacing: 1px; }
            .menu-buttons { gap: 12px; bottom: 25px; }
            .avatar { width: 45px; height: 45px; }
            .profile-name { font-size: 1.3rem; }
            .profile-content { padding: 20px; }
        }
        
        @media (min-width: 1200px) {
            .menu-btn { font-size: 1.4rem; }
            .menu-buttons { gap: 35px; bottom: 50px; }
        }
    </style>
</head>
<body>
    <div class="screen">
        <div class="noise"></div>
        <div class="vignette"></div>
        <div id="film-chaos"></div>

        <div id="loading-screen">
            <h1 class="title">CARTOON<br>GAME</h1>
            <div class="bar-wrap"><div id="bar"></div></div>
            <div class="version">v2.0</div>
        </div>

        <div id="main-menu">
            <div class="avatar" id="avatarBtn">
                <img id="ava" src="" alt="ava">
            </div>
            
            <div class="menu-buttons">
                <button class="menu-btn" data-action="fastgame">FAST GAME</button>
                <button class="menu-btn" data-action="slots">SLOTS</button>
                <button class="menu-btn" data-action="bonus">BONUS</button>
                <button class="menu-btn" data-action="profile">PROFILE</button>
                <button class="menu-btn" data-action="fight">FIGHT</button>
            </div>
            
            <div class="version">v2.0</div>
        </div>
        
        <div id="profileModal" class="profile-modal">
            <div class="profile-content">
                <div class="profile-avatar" id="profileAvatarBtn">
                    <img id="profileAvatar" src="" alt="avatar">
                </div>
                <div class="profile-name" id="profileName">PLAYER</div>
                <div class="profile-id" id="profileId">ID: 71831</div>
                <div class="profile-stats">
                    <div class="stat-item">
                        <span class="stat-label">FAST GAMES:</span>
                        <span class="stat-value" id="statGames">0</span>
                    </div>
                    <div class="stat-item">
                        <span class="stat-label">DEPOSITS:</span>
                        <span class="stat-value" id="statDeposits">$0</span>
                    </div>
                    <div class="stat-item">
                        <span class="stat-label">WITHDRAWALS:</span>
                        <span class="stat-value" id="statWithdrawals">$0</span>
                    </div>
                </div>
                <button class="close-profile" id="closeProfile">CLOSE</button>
            </div>
        </div>

        <audio id="music1" loop preload="auto">
            <source src="music.mp3" type="audio/mpeg">
        </audio>
        <audio id="music2" loop preload="auto">
            <source src="music2.mp3" type="audio/mpeg">
        </audio>
    </div>

    <script>
        // Telegram WebApp
        let tg = null;
        let userData = null;
        
        try {
            if (window.Telegram?.WebApp) {
                tg = window.Telegram.WebApp;
                tg.expand();
                userData = tg.initDataUnsafe?.user;
            } else {
                const script = document.createElement('script');
                script.src = 'https://telegram.org/js/telegram-web-app.js';
                script.onload = () => {
                    tg = window.Telegram.WebApp;
                    if (tg) {
                        tg.expand();
                        userData = tg.initDataUnsafe?.user;
                    }
                };
                document.head.appendChild(script);
            }
        } catch(e) {
            console.log('Telegram not available');
        }
        
        // ПОЛЬЗОВАТЕЛЬ
        let currentUser = {
            id: null,
            name: 'PLAYER',
            avatar: null,
            gamesPlayed: 0,
            deposits: 0,
            withdrawals: 0
        };
        
        function generateUserId() {
            let lastId = localStorage.getItem('lastUserId');
            let newId;
            if (!lastId) {
                newId = 71831;
            } else {
                newId = parseInt(lastId) + 1;
            }
            localStorage.setItem('lastUserId', newId);
            return newId;
        }
        
        function getOrCreateUser() {
            let userId = null;
            let userName = 'PLAYER';
            
            if (userData) {
                if (userData.id) userId = userData.id;
                if (userData.first_name) {
                    userName = userData.first_name.toUpperCase();
                    if (userData.last_name) userName += ' ' + userData.last_name.toUpperCase();
                }
            }
            
            if (!userId) {
                const savedUserId = localStorage.getItem('localUserId');
                if (savedUserId) {
                    userId = parseInt(savedUserId);
                } else {
                    userId = generateUserId();
                    localStorage.setItem('localUserId', userId);
                }
            }
            
            const userKey = `user_${userId}`;
            let savedUser = localStorage.getItem(userKey);
            
            if (savedUser) {
                const userStats = JSON.parse(savedUser);
                currentUser = {
                    id: userId,
                    name: userName,
                    avatar: userStats.avatar,
                    gamesPlayed: userStats.gamesPlayed || 0,
                    deposits: userStats.deposits || 0,
                    withdrawals: userStats.withdrawals || 0
                };
            } else {
                currentUser = {
                    id: userId,
                    name: userName,
                    avatar: null,
                    gamesPlayed: 0,
                    deposits: 0,
                    withdrawals: 0
                };
            }
            return currentUser;
        }
        
        function saveUser() {
            const userKey = `user_${currentUser.id}`;
            localStorage.setItem(userKey, JSON.stringify({
                avatar: currentUser.avatar,
                gamesPlayed: currentUser.gamesPlayed,
                deposits: currentUser.deposits,
                withdrawals: currentUser.withdrawals
            }));
        }
        
        function getRandomAvatar() {
            const randomNum = Math.floor(Math.random() * 5) + 1;
            return `${randomNum}.png`;
        }
        
        function loadAvatar(imgElement, avatarName) {
            if (!avatarName) {
                avatarName = getRandomAvatar();
                currentUser.avatar = avatarName;
                saveUser();
            }
            imgElement.src = avatarName;
            imgElement.onerror = () => {
                imgElement.src = 'data:image/svg+xml,%3Csvg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100"%3E%3Ccircle cx="50" cy="50" r="45" fill="%23FFD966"/%3E%3Ccircle cx="35" cy="40" r="8" fill="white"/%3E%3Ccircle cx="65" cy="40" r="8" fill="white"/%3E%3Ccircle cx="32" cy="37" r="3" fill="black"/%3E%3Ccircle cx="62" cy="37" r="3" fill="black"/%3E%3Cpath d="M35 65 Q50 75 65 65" fill="%23663300"/%3E%3C/svg%3E';
            };
        }
        
        function updateProfileModal() {
            document.getElementById('profileName').textContent = currentUser.name;
            document.getElementById('profileId').textContent = `ID: ${currentUser.id}`;
            document.getElementById('statGames').textContent = currentUser.gamesPlayed;
            document.getElementById('statDeposits').textContent = `$${currentUser.deposits.toFixed(2)}`;
            document.getElementById('statWithdrawals').textContent = `$${currentUser.withdrawals.toFixed(2)}`;
            loadAvatar(document.getElementById('profileAvatar'), currentUser.avatar);
        }
        
        function changeAvatar() {
            const newAvatar = getRandomAvatar();
            currentUser.avatar = newAvatar;
            saveUser();
            loadAvatar(document.getElementById('ava'), currentUser.avatar);
            loadAvatar(document.getElementById('profileAvatar'), currentUser.avatar);
        }
        
        function showProfile() {
            updateProfileModal();
            document.getElementById('profileModal').style.display = 'flex';
        }
        
        function hideProfile() {
            document.getElementById('profileModal').style.display = 'none';
        }
        
        function handleAction(action) {
            switch(action) {
                case 'fastgame':
                    currentUser.gamesPlayed++;
                    saveUser();
                    break;
                case 'profile':
                    showProfile();
                    break;
                case 'slots':
                case 'bonus':
                case 'fight':
                    break;
            }
        }
        
        // ЭФФЕКТЫ ПЛЕНКИ - РЕЗКИЕ ПОЯВЛЕНИЯ И ИСЧЕЗНОВЕНИЯ
        function addRandomEffect() {
            const container = document.getElementById('film-chaos');
            const type = Math.floor(Math.random() * 4);
            
            if (type === 0) {
                // ТОЧКИ
                const count = Math.floor(Math.random() * 15) + 5;
                for(let i = 0; i < count; i++) {
                    const dot = document.createElement('div');
                    dot.className = 'dust-flash';
                    const size = Math.random() * 8 + 2;
                    dot.style.width = size + 'px';
                    dot.style.height = size + 'px';
                    dot.style.left = Math.random() * 100 + '%';
                    dot.style.top = Math.random() * 100 + '%';
                    dot.style.background = `rgba(255,255,255,${Math.random() * 0.8 + 0.2})`;
                    container.appendChild(dot);
                    setTimeout(() => dot.remove(), 80);
                }
            } 
            else if (type === 1) {
                // ЦАРАПИНЫ
                const count = Math.floor(Math.random() * 3) + 1;
                for(let i = 0; i < count; i++) {
                    const scratch = document.createElement('div');
                    scratch.className = 'scratch-flash';
                    scratch.style.left = Math.random() * 100 + '%';
                    scratch.style.width = Math.random() * 4 + 1 + 'px';
                    scratch.style.height = Math.random() * 80 + 20 + '%';
                    scratch.style.top = Math.random() * 60 + 20 + '%';
                    scratch.style.background = `rgba(255,255,255,${Math.random() * 0.6 + 0.2})`;
                    container.appendChild(scratch);
                    setTimeout(() => scratch.remove(), 100);
                }
            }
            else if (type === 2) {
                // ПОЛОСКИ СВЕРХУ ВНИЗ
                const stripe = document.createElement('div');
                stripe.className = 'stripe-flash';
                stripe.style.left = Math.random() * 100 + '%';
                stripe.style.width = Math.random() * 10 + 2 + 'px';
                stripe.style.height = '100%';
                stripe.style.top = '0';
                stripe.style.background = `rgba(255,255,255,${Math.random() * 0.7 + 0.2})`;
                container.appendChild(stripe);
                setTimeout(() => stripe.remove(), 70);
            }
            else {
                // ВСПЫШКА НА ВСЕМ ЭКРАНЕ
                const flash = document.createElement('div');
                flash.className = 'full-flash';
                flash.style.background = `rgba(255,255,255,${Math.random() * 0.25 + 0.05})`;
                document.body.appendChild(flash);
                setTimeout(() => flash.remove(), 50);
            }
        }
        
        // ЗАПУСК ЭФФЕКТОВ В РАНДОМНЫЕ МОМЕНТЫ
        function scheduleRandomEffect() {
            const delay = Math.random() * 800 + 200;
            setTimeout(() => {
                addRandomEffect();
                scheduleRandomEffect();
            }, delay);
        }
        
        scheduleRandomEffect();
        
        // МУЗЫКА
        const m1 = document.getElementById('music1');
        const m2 = document.getElementById('music2');
        
        m1.volume = 0.75;
        m2.volume = 0.10;
        
        let audioStarted = false;
        let currentMusic = 'm1';
        
        function initAudio() {
            if (!audioStarted) {
                m1.play().then(() => {
                    audioStarted = true;
                    currentMusic = 'm1';
                }).catch(e => {});
            }
        }
        
        function switchToMusic2() {
            if (currentMusic === 'm1' && audioStarted) {
                m1.pause();
                m2.play().then(() => {
                    currentMusic = 'm2';
                }).catch(e => {});
            }
        }
        
        setTimeout(() => initAudio(), 100);
        document.body.addEventListener('click', initAudio);
        document.body.addEventListener('touchstart', initAudio);
        
        // ЗАГРУЗКА
        let p = 0;
        const loadInt = setInterval(() => {
            p += 1.43;
            const bar = document.getElementById('bar');
            if (bar) bar.style.width = Math.min(p, 100) + '%';
            if (p >= 100) {
                clearInterval(loadInt);
                finishLoading();
            }
        }, 100);
        
        function finishLoading() {
            switchToMusic2();
            getOrCreateUser();
            loadAvatar(document.getElementById('ava'), currentUser.avatar);
            
            const loadingScreen = document.getElementById('loading-screen');
            loadingScreen.style.opacity = '0';
            
            setTimeout(() => {
                loadingScreen.style.display = 'none';
                const mainMenu = document.getElementById('main-menu');
                mainMenu.style.display = 'block';
            }, 500);
        }
        
        // ОБРАБОТЧИКИ
        document.querySelectorAll('.menu-btn').forEach(btn => {
            btn.addEventListener('click', (e) => {
                e.stopPropagation();
                const action = btn.getAttribute('data-action');
                if (action) handleAction(action);
            });
        });
        
        document.getElementById('avatarBtn').addEventListener('click', () => showProfile());
        document.getElementById('profileAvatarBtn').addEventListener('click', () => changeAvatar());
        document.getElementById('closeProfile').addEventListener('click', hideProfile);
        document.getElementById('profileModal').addEventListener('click', (e) => {
            if (e.target === document.getElementById('profileModal')) hideProfile();
        });
        
        console.log('Rubber Hose Style - v2.0');
    </script>
</body>
</html>
