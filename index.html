<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cuphead Loading Pro</title>
    <style>
        body, html {
            margin: 0; padding: 0;
            width: 100%; height: 100%;
            background-color: #050505;
            overflow: hidden;
            display: flex; justify-content: center; align-items: center;
        }

        /* Общий контейнер для фильтров */
        .film-container {
            position: fixed; top: 0; left: 0;
            width: 100%; height: 100%;
            pointer-events: none;
            z-index: 100;
        }

        /* Постоянное легкое зерно */
        .noise {
            position: fixed; top: 0; left: 0;
            width: 100%; height: 100%;
            opacity: 0.05;
            background: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://w3.org id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='3'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
            z-index: 110;
        }

        /* Стили для динамических элементов (создаются через JS) */
        .dust {
            position: absolute;
            background: #fff;
            border-radius: 50%;
            opacity: 0.4;
        }

        .scratch {
            position: absolute;
            background: rgba(255, 255, 255, 0.15);
            width: 1px;
            height: 100%;
        }

        /* ТЕКСТ */
        .title {
            color: #fff;
            font-family: 'Georgia', serif;
            font-size: 3.5rem;
            font-weight: 900;
            text-align: center;
            text-transform: uppercase;
            z-index: 50;
            /* Замедляем основную анимацию */
            animation: rubber-slow 1.2s infinite ease-in-out alternate;
        }

        @keyframes rubber-slow {
            from { transform: scaleY(1) translateY(0); }
            to { transform: scaleY(1.05) scaleX(0.98) translateY(-10px); }
        }

        .vignette {
            position: fixed; top: 0; left: 0;
            width: 100%; height: 100%;
            background: radial-gradient(circle, transparent 40%, black 150%);
            z-index: 120;
        }
    </style>
</head>
<body>

    <div class="noise"></div>
    <div class="vignette"></div>
    <div class="film-container" id="film"></div>

    <h1 class="title">Cartoon<br>Game</h1>

    <script>
        const container = document.getElementById('film');

        // Функция для создания случайной пылинки
        function createDust() {
            const dust = document.createElement('div');
            dust.className = 'dust';
            
            // Рандомный размер и позиция
            const size = Math.random() * 4 + 1;
            dust.style.width = size + 'px';
            dust.style.height = size + 'px';
            dust.style.left = Math.random() * 100 + '%';
            dust.style.top = Math.random() * 100 + '%';
            
            container.appendChild(dust);

            // Удаляем через мгновение (эффект вспышки)
            setTimeout(() => {
                dust.remove();
            }, 60); 
        }

        // Функция для создания вертикальной полоски
        function createScratch() {
            const scratch = document.createElement('div');
            scratch.className = 'scratch';
            scratch.style.left = Math.random() * 100 + '%';
            
            container.appendChild(scratch);

            setTimeout(() => {
                scratch.remove();
            }, 80);
        }

        // Зацикливаем создание эффектов с разными интервалами
        // Пылинки появляются чаще
        setInterval(createDust, 150); 
        
        // Полоски появляются реже и хаотично
        setInterval(() => {
            if(Math.random() > 0.5) createScratch();
        }, 400);

    </script>
</body>
</html>
