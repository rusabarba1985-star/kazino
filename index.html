<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Cartoon Game - Hub</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Luckiest+Guy&display=swap');
        :root { --bg: #000; --font-main: 'Luckiest Guy', cursive; --spring: cubic-bezier(0.68, -0.6, 0.32, 1.6); }
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; background: #000; color: #fff; font-family: var(--font-main); overflow: hidden; }
        
        /* ПЛЕНКА ПОВЕРХ ВСЕГО */
        .noise { position: fixed; inset: 0; opacity: 0.15; pointer-events: none; z-index: 5000; background: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.8' numOctaves='3'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E"); }
        #film-chaos { position: fixed; inset: 0; pointer-events: none; z-index: 5001; }
        .dust, .scratch { position: absolute; background: rgba(255,255,255,0.4); animation: fadeOut 0.8s forwards; }
        @keyframes fadeOut { 0% { opacity: 0.5; } 100% { opacity: 0; } }

        /* ИНТЕРФЕЙС */
        .header { display: flex; justify-content: space-between; padding: 20px; align-items: center; }
        .balance { font-size: 2.2rem; text-shadow: 3px 3px 0 #333; }
        .avatar { width: 70px; height: 70px; border: 5px solid #fff; border-radius: 50%; overflow: hidden; cursor: pointer; }

        /* КНОПКИ ВНИЗУ */
        .bottom-nav { position: fixed; bottom: 30px; width: 100%; display: flex; justify-content: center; z-index: 100; }
        .btn-group { display: flex; gap: 8px; transition: transform 0.6s var(--spring); }
        
        /* Кнопки меню */
        #main-btns { transform: translateY(0); }
        #main-btns.hide { transform: translateY(200%); }

        /* Кнопки игр */
        #sub-btns { position: absolute; transform: translateY(200%); }
        #sub-btns.show { transform: translateY(0); }

        .btn-cartoon {
            background: #000; color: #fff; border: 4px solid #fff; padding: 10px 15px;
            font-family: var(--font-main); font-size: 0.8rem; border-radius: 15px;
            cursor: pointer; text-transform: uppercase; box-shadow: 0 5px 0 #333;
        }

        #loading-screen { position: fixed; inset: 0; background: #000; display: flex; flex-direction: column; justify-content: center; align-items: center; z-index: 10000; }
        #bar { width: 0%; height: 100%; background: #fff; transition: width 0.3s; }
    </style>
</head>
<body onclick="resetMenu()">
    <div class="noise"></div>
    <div id="film-chaos"></div>

    <div id="loading-screen">
        <h1 style="font-size:3.5rem; text-align:center;">CARTOON<br>GAME</h1>
        <div style="width:200px; height:12px; border:3px solid #fff; border-radius:10px; margin-top:20px; overflow:hidden;">
            <div id="bar"></div>
        </div>
    </div>

    <div id="ui" style="display:none; opacity:0; transition: 0.8s;">
        <div class="header">
            <div class="balance">$<span id="bal">1000</span></div>
            <div class="avatar" onclick="event.stopPropagation(); changeAva();"><img id="ava" src="1.png" style="width:100%; height:100%;"></div>
        </div>

        <div class="bottom-nav">
            <!-- Главные кнопки -->
            <div class="btn-group" id="main-btns">
                <button class="btn-cartoon" onclick="event.stopPropagation(); toggleSub();">FAST GAME</button>
                <button class="btn-cartoon">SLOTS</button>
                <button class="btn-cartoon">BONUS</button>
                <button class="btn-cartoon">STAT</button>
            </div>
            <!-- Подменю игр -->
            <div class="btn-group" id="sub-btns">
                <button class="btn-cartoon" onclick="window.location.href='roulette.html'">ROULETTE</button>
                <button class="btn-cartoon" onclick="window.location.href='dice.html'">DICE</button>
            </div>
        </div>
    </div>

    <script>
        let balance = parseFloat(localStorage.getItem('balance')) || 1000;

        function toggleSub() {
            document.getElementById('main-btns').classList.add('hide');
            document.getElementById('sub-btns').classList.add('show');
        }

        function resetMenu() {
            document.getElementById('main-btns').classList.remove('hide');
            document.getElementById('sub-btns').classList.remove('show');
        }

        function changeAva() {
            let cur = parseInt(localStorage.getItem('userAva')) || 1;
            cur = cur >= 5 ? 1 : cur + 1;
            localStorage.setItem('userAva', cur);
            document.getElementById('ava').src = cur + '.png';
        }

        // ПЛЕНКА
        setInterval(() => {
            const c = document.getElementById('film-chaos');
            const d = document.createElement('div');
            d.className = Math.random() > 0.8 ? 'scratch' : 'dust';
            d.style.left = Math.random() * 100 + '%';
            if(d.className === 'dust') {
                d.style.top = Math.random() * 100 + '%';
                d.style.width = d.style.height = (Math.random()*5+2)+'px';
            }
            c.appendChild(d); setTimeout(()=>d.remove(), 800);
        }, 200);

        let p = 0;
        const loader = setInterval(() => {
            p += 10; document.getElementById('bar').style.width = p + '%';
            if(p >= 100) {
                clearInterval(loader);
                document.getElementById('loading-screen').style.display='none';
                document.getElementById('ui').style.display='block';
                setTimeout(()=>document.getElementById('ui').style.opacity='1', 50);
                document.getElementById('bal').innerText = balance;
                document.getElementById('ava').src = (localStorage.getItem('userAva') || 1) + '.png';
            }
        }, 100);
    </script>
</body>
</html>
