<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Cartoon Game - Pro Noir</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Luckiest+Guy&display=swap');

        :root { 
            --bg: #000; --text: #fff; --font: 'Luckiest Guy', cursive;
            --spring: cubic-bezier(0.68, -0.6, 0.32, 1.6);
            --soft: cubic-bezier(0.175, 0.885, 0.32, 1.275);
            --red: #b31d1d; --black: #1a1a1a; --green: #2d7a2d;
        }

        body, html { margin:0; padding:0; width:100%; height:100%; background:var(--bg); color:var(--text); font-family:var(--font); overflow:hidden; user-select:none; }

        .noise { position:fixed; inset:0; opacity:0.12; pointer-events:none; z-index:2000; background:url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.8' numOctaves='3'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E"); }
        .vignette { position:fixed; inset:0; background:radial-gradient(circle, transparent 20%, black 150%); z-index:2001; pointer-events:none; }

        .btn-cartoon { background:#000; color:#fff; border:4px solid #fff; padding:8px 15px; font-family:var(--font); font-size:0.8rem; border-radius:15px; cursor:pointer; text-transform:uppercase; box-shadow:0 4px 0 #333; transition:0.3s var(--spring); }
        .btn-cartoon:active { transform:scale(0.9); }

        /* ЭКРАНЫ */
        .modal { position:fixed; inset:0; background:#000; display:none; flex-direction:column; z-index:800; }
        .modal.show { display:flex; }

        .roulette-screen { position:relative; height:100%; display:flex; flex-direction:column; overflow:hidden; }
        .roulette-header { display:flex; justify-content:space-between; padding:15px; z-index:100; font-size:1.5rem; }

        .wheel-area { flex:1; display:flex; flex-direction:column; align-items:center; justify-content:center; position:relative; }
        .mickey-mous { width:80px; height:100px; position:absolute; left:10px; bottom:20px; background:url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 120"><circle cx="50" cy="50" r="30" fill="white" stroke="black" stroke-width="4"/><circle cx="25" cy="25" r="15" fill="black"/><circle cx="75" cy="25" r="15" fill="black"/><ellipse cx="40" cy="45" rx="5" ry="8" fill="black"/><ellipse cx="60" cy="45" rx="5" ry="8" fill="black"/><path d="M35 70 Q50 85 65 70" fill="none" stroke="black" stroke-width="3" stroke-linecap="round"/></svg>') no-repeat center; animation: bounce 0.5s infinite alternate; z-index: 5; }
        @keyframes bounce { from { transform:translateY(0); } to { transform:translateY(-10px); } }

        .wheel-wrap { position:relative; width:300px; height:300px; border:10px solid #fff; border-radius:50%; box-shadow:0 0 30px rgba(255,255,255,0.2); z-index: 2; }
        #wheel { width:100%; height:100%; border-radius:50%; transition:transform 4s cubic-bezier(0.1, 0, 0.1, 1); background:#222; }
        .wheel-ptr { position:absolute; top:-15px; left:50%; transform:translateX(-50%); width:35px; height:45px; background:#fff; clip-path:polygon(50% 100%, 0 0, 100% 0); z-index:10; }

        /* СТОЛ (УЕЗЖАЕТ ВНИЗ) */
        .bet-board { 
            position:absolute; bottom:0; width:100%; background:#000; border-top:6px solid #fff; 
            border-radius:30px 30px 0 0; transition: transform 0.6s var(--spring); 
            padding:15px 5px 120px; box-sizing:border-box; z-index:150;
            transform: translateY(100%); /* Полный уход */
        }
        .bet-board.active { transform: translateY(0); }
        
        .board-layout { display:flex; gap:8px; justify-content:center; max-width:420px; margin:0 auto; }
        .num-grid { display:grid; grid-template-columns: repeat(3, 1fr); gap:5px; flex:1; }
        .side-bets { display:flex; flex-direction:column; gap:5px; width:70px; }

        .cell { height:45px; border:2.5px solid #fff; border-radius:12px; display:flex; align-items:center; justify-content:center; position:relative; cursor:pointer; font-size:1.1rem; }
        .cell.green { background:var(--green); grid-column: span 3; height:55px; font-size: 1.5rem; }
        .cell.red { background:var(--red); }
        .cell.black { background:var(--black); }
        .cell.outside { background:#111; font-size:0.7rem; height:80px; }

        /* ФИШКА НА ЯЧЕЙКЕ */
        .chip-on-board { position:absolute; width:28px; height:28px; background:#fff; border:2px solid #000; border-radius:50%; color:#000; font-size:9px; display:flex; align-items:center; justify-content:center; z-index:10; pointer-events:none; }
        .chip-on-board::after { content:''; position:absolute; inset:2px; border:1px dashed #000; border-radius:50%; }

        /* УПРАВЛЕНИЕ */
        .controls { position:fixed; bottom:90px; right:20px; display:flex; flex-direction:column; align-items:center; gap:12px; z-index:200; }
        .undo-btn { width:55px; height:55px; background:#fff; color:#000; border:4px solid #000; border-radius:50%; font-size:2.2rem; cursor:pointer; display:flex; align-items:center; justify-content:center; box-shadow:0 4px 0 #333; transition: 0.2s; }
        .undo-btn:active { transform: scale(0.8); }

        .chip-sel { width:80px; height:80px; background:#111; border:5px solid #fff; border-radius:50%; display:flex; align-items:center; justify-content:center; cursor:pointer; position:relative; }
        .chip-sel::after { content:''; position:absolute; inset:0; border:8px dashed #fff; border-radius:50%; }
        
        .sub-chip-list { position:absolute; bottom:0; left:0; width:100%; height:100%; pointer-events:none; }
        .sub-chip { position:absolute; width:60px; height:60px; border:4px solid #fff; border-radius:50%; background:#222; display:flex; align-items:center; justify-content:center; opacity:0; transition:0.5s var(--spring); transform:scale(0); font-size:0.8rem; pointer-events:auto; }
        .active .sub-chip { opacity:1; transform:scale(1); }

        .timer-val { font-size:3.5rem; color:#ff0; text-shadow:3px 3px 0 #000; }
        .win-feed { position:absolute; top:80px; left:15px; font-size:0.8rem; color:#ffd966; pointer-events:none; z-index: 10; }

        #res-pop { position:fixed; top:50%; left:50%; transform:translate(-50%,-50%) scale(0); background:#fff; border:8px solid #000; border-radius:30px; padding:25px; z-index:3000; text-align:center; color:#000; transition:0.6s var(--spring); width:240px; }
        #res-pop img { width:150px; height:150px; border:5px solid #000; border-radius:20px; object-fit:cover; margin-bottom:15px; }
        #res-pop.show { transform:translate(-50%,-50%) scale(1); }

        #fast-game-sub { position:fixed; bottom:85px; left:50%; transform:translateX(-50%) scale(0); background:#000; border:5px solid #fff; border-radius:20px; padding:10px; display:flex; gap:10px; transition:0.4s var(--spring); transform-origin:bottom; z-index:100; }
        #fast-game-sub.active { transform:translateX(-50%) scale(1); }

        .menu-bar { position:fixed; bottom:20px; width:100%; display:flex; justify-content:center; gap:8px; z-index:100; padding:0 10px; box-sizing:border-box; }
    </style>
</head>
<body onclick="initAudio()">

    <div class="noise"></div>
    <div class="vignette"></div>

    <audio id="music1" loop><source src="music.mp3" type="audio/mpeg"></audio>
    <audio id="music2" loop><source src="music2.mp3" type="audio/mpeg"></audio>

    <!-- LOADING -->
    <div id="loading-screen" style="position:fixed; inset:0; background:#000; z-index:2000; display:flex; flex-direction:column; justify-content:center; align-items:center;">
        <h1 style="font-size:4rem; text-align:center;">CARTOON<br>GAME</h1>
        <div style="width:200px; height:12px; border:4px solid #fff; border-radius:10px; margin-top:30px; overflow:hidden;">
            <div id="bar" style="height:100%; width:0%; background:#fff;"></div>
        </div>
    </div>

    <!-- MAIN MENU -->
    <div id="main-menu" style="display:none; height:100vh;">
        <div style="display:flex; justify-content:space-between; padding:20px; align-items:center;">
            <div style="font-size:2.2rem;">$<span id="bal-val">1000</span></div>
            <div id="avaBtn" style="width:70px; height:70px; border:5px solid #fff; border-radius:50%; overflow:hidden; cursor:pointer;"><img id="m-ava" src="" style="width:100%; height:100%; object-fit:cover;"></div>
        </div>

        <div id="fast-game-sub">
            <button class="btn-cartoon" id="openRoulette">ROULETTE</button>
            <button class="btn-cartoon" id="openDice">DICE</button>
        </div>

        <div class="menu-bar">
            <button class="btn-cartoon" id="fastGameBtn">FAST GAME</button>
            <button class="btn-cartoon">SLOTS</button>
            <button class="btn-cartoon">BONUS</button>
            <button class="btn-cartoon" id="statBtn">STAT</button>
        </div>
    </div>

    <!-- ROULETTE MODAL -->
    <div id="rouletteModal" class="modal">
        <div class="roulette-screen">
            <div class="roulette-header">
                <div>$<span id="roul-bal">1000</span></div>
                <div class="timer-val" id="roulTimer">10</div>
                <button class="btn-cartoon" onclick="exitRoul()">EXIT</button>
            </div>

            <div class="win-feed" id="roulFeed"></div>

            <div class="wheel-area">
                <div class="mickey-mous"></div>
                <div class="wheel-ptr"></div>
                <div class="wheel-wrap">
                    <div id="wheel"></div>
                </div>
            </div>

            <!-- УПРАВЛЕНИЕ -->
            <div class="controls">
                <button class="undo-btn" id="undoBet">↩</button>
                <div class="chip-sel" id="mainChip">
                    <span id="curBetTxt">$0.1</span>
                    <div class="sub-chip-list" id="radialChips">
                        <div class="sub-chip" data-val="0.1">$0.1</div>
                        <div class="sub-chip" data-val="0.5">$0.5</div>
                        <div class="sub-chip" data-val="1">$1</div>
                        <div class="sub-chip" data-val="5">$5</div>
                        <div class="sub-chip" data-val="10">$10</div>
                    </div>
                </div>
            </div>

            <!-- ПОЛЕ СТАВОК -->
            <div class="bet-board active" id="betBoard">
                <div class="board-layout">
                    <div class="side-bets">
                        <div class="cell outside" data-target="even">EVEN</div>
                        <div class="cell outside" data-target="odd">ODD</div>
                    </div>
                    <div class="num-grid" id="numGrid">
                        <div class="cell green" data-target="0">0</div>
                    </div>
                    <div class="side-bets">
                        <div class="cell outside" data-target="1-18">1-18</div>
                        <div class="cell outside" data-target="19-36">19-36</div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <div id="res-pop">
        <img id="res-img" src="" alt="">
        <div id="res-txt" style="font-size:1.8rem;">YOU WIN!</div>
    </div>

    <script>
        let balance = 1000;
        let betVal = 0.1;
        let timer = 10;
        let isRolling = false;
        let activeBets = []; // { target, amount, el }
        let betHistory = []; // Для Undo кликов
        let audioStarted = false;

        const m1 = document.getElementById('music1');
        const m2 = document.getElementById('music2');

        function initAudio() { if(!audioStarted) { m1.volume=0.4; m2.volume=0.4; m1.play(); audioStarted=true; } }
        function switchMusic() { m1.pause(); m2.play(); }

        function setupRoulette() {
            const wheel = document.getElementById('wheel');
            const grid = document.getElementById('numGrid');
            const nums = [0, 32, 15, 19, 4, 21, 2, 25, 17, 34, 6, 27, 13, 36, 11, 30, 8, 23, 10, 5, 24, 16, 33, 1, 20, 14, 31, 9, 22, 18, 29, 7, 28, 12, 35, 3, 26];
            
            wheel.innerHTML = '';
            nums.forEach((n, i) => {
                const angle = (360 / 37) * i;
                const color = n === 0 ? '#2d7a2d' : (i % 2 === 0 ? '#1a1a1a' : '#b31d1d');
                const div = document.createElement('div');
                div.style.cssText = `position:absolute; width:100%; height:100%; transform:rotate(${angle}deg); text-align:center; color:#fff; font-size:12px; padding-top:10px; border-left:1px solid rgba(255,255,255,0.1); background: conic-gradient(from -5deg, transparent 0, ${color} 10deg, transparent 10deg);`;
                div.innerText = n;
                wheel.appendChild(div);
            });

            grid.innerHTML = '<div class="cell green" data-target="0">0</div>';
            for(let i=1; i<=36; i++) {
                const cell = document.createElement('div');
                cell.className = `cell ${i % 2 === 0 ? 'black' : 'red'}`;
                cell.innerText = i;
                cell.dataset.target = i;
                grid.appendChild(cell);
            }

            document.querySelectorAll('.cell').forEach(el => {
                el.onclick = () => placeBet(el);
            });
        }

        function placeBet(el) {
            if(isRolling || timer <= 0) return;
            const target = el.dataset.target;

            // Взаимоисключение
            if(target === 'even' && activeBets.some(b => b.target === 'odd')) return;
            if(target === 'odd' && activeBets.some(b => b.target === 'even')) return;
            if(target === '1-18' && activeBets.some(b => b.target === '19-36')) return;
            if(target === '19-36' && activeBets.some(b => b.target === '1-18')) return;

            if(balance < betVal) return;

            balance -= betVal;
            
            let existing = activeBets.find(b => b.target === target);
            if(existing) {
                existing.amount += betVal;
                existing.el.innerText = existing.amount.toFixed(1);
            } else {
                if(activeBets.length >= 5) { balance += betVal; return alert("MAX 5 DIFFERENT TARGETS!"); }
                const chip = document.createElement('div');
                chip.className = 'chip-on-board';
                chip.innerText = betVal.toFixed(1);
                el.appendChild(chip);
                existing = { target, amount: betVal, el: chip };
                activeBets.push(existing);
            }

            betHistory.push({ target, amount: betVal });
            updateUI();
        }

        document.getElementById('undoBet').onclick = () => {
            if(isRolling || betHistory.length === 0) return;
            const last = betHistory.pop();
            const betObj = activeBets.find(b => b.target === last.target);
            
            balance += last.amount;
            betObj.amount -= last.amount;

            if(betObj.amount <= 0) {
                betObj.el.remove();
                activeBets = activeBets.filter(b => b.target !== last.target);
            } else {
                betObj.el.innerText = betObj.amount.toFixed(1);
            }
            updateUI();
        };

        function startTimer() {
            const timerEl = document.getElementById('roulTimer');
            const board = document.getElementById('betBoard');
            const feed = document.getElementById('roulFeed');
            
            const countdown = setInterval(() => {
                timer--;
                timerEl.innerText = timer;

                // Фейковые выигрыши в ленту
                if(timer % 3 === 0) {
                    const names = ["Felix", "Bendy", "Cuphead", "Oswald"];
                    const winAmt = (Math.random() * 5 + 1).toFixed(1);
                    feed.innerHTML = `<div>${names[Math.floor(Math.random()*names.length)]} win $${winAmt}</div>` + feed.innerHTML;
                    if(feed.children.length > 4) feed.lastChild.remove();
                }

                if(timer <= 0) {
                    clearInterval(countdown);
                    board.classList.remove('active'); // Уходит за экран
                    spinWheel();
                }
            }, 1000);
        }

        function spinWheel() {
            isRolling = true;
            const wheel = document.getElementById('wheel');
            const nums = [0, 32, 15, 19, 4, 21, 2, 25, 17, 34, 6, 27, 13, 36, 11, 30, 8, 23, 10, 5, 24, 16, 33, 1, 20, 14, 31, 9, 22, 18, 29, 7, 28, 12, 35, 3, 26];
            
            // ШАНС 1/100 на ЗЕРО
            let resNum;
            let resIdx;
            if(Math.random() < 0.01) {
                resNum = 0;
                resIdx = 0;
            } else {
                resIdx = Math.floor(Math.random()*36) + 1; // 1-36
                resNum = nums[resIdx];
            }
            
            const rotation = (360 * 5) + (resIdx * (360/37));
            wheel.style.transform = `rotate(-${rotation}deg)`;

            setTimeout(() => {
                isRolling = false;
                processRoulResult(resNum);
                wheel.style.transition = 'none';
                wheel.style.transform = `rotate(-${resIdx * (360/37)}deg)`;
                setTimeout(() => {
                    wheel.style.transition = 'transform 4s cubic-bezier(0.1, 0, 0.1, 1)';
                    timer = 10;
                    activeBets.forEach(b => b.el.remove());
                    activeBets = [];
                    betHistory = [];
                    document.getElementById('betBoard').classList.add('active');
                    startTimer();
                }, 100);
            }, 4500);
        }

        function processRoulResult(res) {
            let totalWin = 0;
            activeBets.forEach(bet => {
                let win = false;
                let mult = 0;
                if(bet.target == res) { win = true; mult = res == 0 ? 20 : 10; }
                else if(bet.target === 'even' && res !== 0 && res % 2 === 0) { win = true; mult = 2; }
                else if(bet.target === 'odd' && res % 2 !== 0) { win = true; mult = 2; }
                else if(bet.target === '1-18' && res >= 1 && res <= 18) { win = true; mult = 2; }
                else if(bet.target === '19-36' && res >= 19 && res <= 36) { win = true; mult = 2; }

                if(win) totalWin += bet.amount * mult;
            });

            const pop = document.getElementById('res-pop');
            const img = document.getElementById('res-img');
            const txt = document.getElementById('res-txt');

            if(totalWin > 0) {
                balance += totalWin;
                img.src = "Dicewin.gif";
                txt.innerText = "YOU WIN $" + totalWin.toFixed(1);
            } else {
                img.src = "Dicelose.jpg";
                txt.innerText = "NO LUCK!";
            }
            pop.classList.add('show');
            setTimeout(() => pop.classList.remove('show'), 2500);
            updateUI();
        }

        const mainChip = document.getElementById('mainChip');
        const radial = document.getElementById('radialChips');
        mainChip.onclick = (e) => {
            e.stopPropagation();
            const act = radial.classList.toggle('active');
            radial.querySelectorAll('.sub-chip').forEach((c, i) => {
                if(act) {
                    const angle = (i * 40) - 120;
                    c.style.transform = `translate(${Math.cos(angle*Math.PI/180)*110}px, ${Math.sin(angle*Math.PI/180)*110}px) scale(1)`;
                } else { c.style.transform = 'translate(0,0) scale(0)'; }
            });
        };
        radial.querySelectorAll('.sub-chip').forEach(sc => {
            sc.onclick = (e) => {
                e.stopPropagation();
                betVal = parseFloat(sc.dataset.val);
                document.getElementById('curBetTxt').innerText = '$' + betVal;
                radial.classList.remove('active');
                radial.querySelectorAll('.sub-chip').forEach(c => c.style.transform = 'translate(0,0) scale(0)');
            };
        });

        function updateUI() {
            document.getElementById('bal-val').innerText = balance.toFixed(2);
            document.getElementById('roul-bal').innerText = balance.toFixed(2);
        }

        function exitRoul() { if(isRolling) return; document.getElementById('routteModal').classList.remove('show'); }
        
        document.getElementById('fastGameBtn').onclick = (e) => { e.stopPropagation(); document.getElementById('fast-game-sub').classList.toggle('active'); };
        document.getElementById('openRoulette').onclick = () => { 
            document.getElementById('rouletteModal').classList.add('show'); 
            setupRoulette(); 
            timer = 10;
            startTimer(); 
        };

        window.onclick = () => { document.getElementById('fast-game-sub').classList.remove('active'); radial.classList.remove('active'); };

        let progress = 0;
        const loader = setInterval(() => {
            progress += 5; document.getElementById('bar').style.width = progress + '%';
            if(progress >= 100) {
                clearInterval(loader); switchMusic();
                document.getElementById('loading-screen').style.display = 'none';
                document.getElementById('main-menu').style.display = 'block';
                setTimeout(() => document.getElementById('main-menu').style.opacity = '1', 50);
                document.getElementById('m-ava').src = localStorage.getItem('userAva') || '1.png';
                updateUI();
            }
        }, 40);

    </script>
</body>
</html>
