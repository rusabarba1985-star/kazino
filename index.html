<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cuphead Chaos Loading</title>
    <style>
        body, html {
            margin: 0; padding: 0;
            width: 100%; height: 100%;
            background-color: #080808;
            overflow: hidden;
            display: flex; justify-content: center; align-items: center;
        }

        /* 1. Слой хаотичных пятен и пыли */
        .dust-layer {
            position: fixed; top: 0; left: 0;
            width: 100%; height: 100%;
            pointer-events: none;
            z-index: 50;
            /* Используем радиальные градиенты для создания случайных белых точек */
            background-image: 
                radial-gradient(circle, #fff 1px, transparent 1px),
                radial-gradient(circle, #fff 2px, transparent 2px),
                radial-gradient(circle, rgba(255,255,255,0.5) 4px, transparent 4px);
            background-size: 400px 400px, 350px 350px, 600px 600px;
            opacity: 0.2;
            /* Главный секрет: резкая смена позиций (steps) */
            animation: chaotic-dust 0.1s steps(1) infinite;
        }

        /* 2. Слой тонких вертикальных полосок (царапин) */
        .scratches-layer {
            position: fixed; top: 0; left: 0;
            width: 100%; height: 100%;
            pointer-events: none;
            z-index: 51;
            background: linear-gradient(90deg, 
                transparent 5%, rgba(255,255,255,0.15) 5.1%, transparent 5.2%,
                transparent 40%, rgba(255,255,255,0.1) 40.2%, transparent 40.4%,
                transparent 85%, rgba(255,255,255,0.12) 85.1%, transparent 85.3%);
            background-size: 200% 100%;
            animation: chaotic-scratches 0.08s steps(1) infinite;
        }

        /* 3. Зернистость (шум) */
        .noise {
            position: fixed; top: 0; left: 0;
            width: 100%; height: 100%;
            z-index: 60;
            opacity: 0.07;
            pointer-events: none;
            background: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://w3.org id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.8' numOctaves='4' stitchTiles='stitch'/%3E%3C/feTurbulence%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
        }

        /* ТЕКСТ В СТИЛЕ RUBBER HOSE */
        .content {
            position: relative; z-index: 100;
            text-align: center;
        }

        .title {
            color: #fff;
            font-family: 'Georgia', serif;
            font-size: 3.5rem;
            font-weight: 900;
            text-transform: uppercase;
            animation: rubber-jump 0.6s infinite ease-in-out alternate;
            filter: drop-shadow(0 0 5px rgba(255,255,255,0.2));
        }

        /* --- АНИМАЦИИ --- */

        /* Пыль прыгает по 4-м разным углам и позициям */
        @keyframes chaotic-dust {
            0% { background-position: 10% 10%; }
            25% { background-position: 80% 30%; }
            50% { background-position: 40% 90%; }
            75% { background-position: 60% 10%; }
            100% { background-position: 20% 50%; }
        }

        /* Царапины резко перемещаются по горизонтали */
        @keyframes chaotic-scratches {
            0% { transform: translateX(0); opacity: 0.3; }
            20% { transform: translateX(-15%); opacity: 0.1; }
            40% { transform: translateX(30%); opacity: 0.4; }
            60% { transform: translateX(-40%); opacity: 0.2; }
            80% { transform: translateX(10%); opacity: 0.5; }
            100% { transform: translateX(-5%); opacity: 0.3; }
        }

        @keyframes rubber-jump {
            from { transform: scaleY(1) translateY(0); }
            to { transform: scaleY(1.1) scaleX(0.95) translateY(-20px); }
        }

        .vignette {
            position: fixed; top: 0; left: 0;
            width: 100%; height: 100%;
            background: radial-gradient(circle, transparent 30%, black 150%);
            z-index: 110; pointer-events: none;
        }
    </style>
</head>
<body>

    <div class="dust-layer"></div>
    <div class="scratches-layer"></div>
    <div class="noise"></div>
    <div class="vignette"></div>

    <div class="content">
        <h1 class="title">Cartoon<br>Game</h1>
    </div>

</body>
</html>
