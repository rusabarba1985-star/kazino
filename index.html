<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cartoon Game</title>
    <style>
        :root { --bg-color: #050505; --text-color: #fff; }
        body, html { 
            margin: 0; padding: 0; width: 100%; height: 100%; 
            background: var(--bg-color); color: var(--text-color); 
            font-family: 'Georgia', serif; overflow: hidden; user-select: none;
        }

        /* ПЛАВНАЯ ПЛЕНКА */
        .noise { position: fixed; inset: 0; opacity: 0.05; pointer-events: none; z-index: 500; background: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.8' numOctaves='3'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E"); }
        #film-chaos { position: fixed; inset: 0; pointer-events: none; z-index: 450; }
        .dust, .scratch { position: absolute; background: #fff; opacity: 0; animation: fadeOut 0.9s ease-out forwards; }
        .dust { border-radius: 50%; background: rgba(200,200,200,0.7); }
        .scratch { background: rgba(255,255,255,0.3); width: 2px; height: 100%; top: 0; }
        @keyframes fadeOut { 
            0% { opacity: 0.6; transform: scale(0.8); } 
            100% { opacity: 0; transform: scale(1.2); } 
        }
        .vignette { position: fixed; inset: 0; background: radial-gradient(circle, transparent 40%, black 150%); z-index: 510; pointer-events: none; }

        /* ЗАГРУЗКА */
        #loading-screen { 
            position: fixed; inset: 0; 
            display: flex; flex-direction: column; justify-content: center; align-items: center; 
            z-index: 100; background: #050505;
            transition: opacity 0.5s ease;
        }
        .title { 
            font-size: 3.5rem; text-align: center; text-transform: uppercase; 
            font-weight: 900; animation: rubber-jump 1s infinite ease-in-out;
            color: white;
            text-shadow: 4px 4px 0px #3a3a3a;
        }
        .bar-wrap { width: 200px; height: 3px; background: #1a1a1a; margin-top: 40px; }
        #bar { width: 0%; height: 100%; background: #fff; transition: width 0.2s linear; }

        /* МЕНЮ */
        #main-menu { 
            display: none; 
            width: 100%; 
            height: 100%; 
            position: relative; 
            z-index: 50;
            opacity: 0;
            transition: opacity 0.5s ease;
        }
        .avatar { 
            position: absolute; top: 20px; right: 20px; 
            width: 60px; height: 60px; border: 2px solid #fff; 
            border-radius: 50%; overflow: hidden; background: #111;
            cursor: pointer;
            transition: transform 0.3s ease;
        }
        .avatar:hover {
            transform: scale(1.05);
        }
        .avatar img { width: 100%; height: 100%; object-fit: cover; }
        
        /* КНОПКИ МЕНЮ */
        .menu-buttons {
            position: absolute;
            bottom: 40px;
            left: 0;
            right: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 12px;
            padding: 0 20px;
        }
        
        .menu-btn {
            width: 100%;
            max-width: 280px;
            padding: 14px 20px;
            background: transparent;
            border: 2px solid rgba(255,255,255,0.5);
            color: white;
            font-family: 'Georgia', serif;
            font-size: 1.2rem;
            font-weight: 900;
            text-transform: uppercase;
            letter-spacing: 2px;
            cursor: pointer;
            transition: all 0.3s ease;
            text-align: center;
            backdrop-filter: blur(4px);
            border-radius: 40px;
            text-shadow: 2px 2px 0px rgba(0,0,0,0.5);
        }
        
        .menu-btn:hover {
            border-color: white;
            background: rgba(255,255,255,0.1);
            transform: scale(1.02);
            letter-spacing: 3px;
        }
        
        .version {
            position: fixed;
            bottom: 5px;
            right: 5px;
            font-size: 9px;
            color: rgba(255,255,255,0.3);
            z-index: 600;
            font-family: monospace;
        }

        @keyframes rubber-jump { 
            0%, 100% { transform: scale(1) translateY(0); } 
            50% { transform: scaleY(1.1) scaleX(0.97) translateY(-15px); } 
        }
    </style>
</head>
<body>

    <div class="noise"></div>
    <div class="vignette"></div>
    <div id="film-chaos"></div>

    <div id="loading-screen">
        <h1 class="title">CARTOON<br>GAME</h1>
        <div class="bar-wrap"><div id="bar"></div></div>
        <div class="version">v1.0.7</div>
    </div>

    <div id="main-menu">
        <div class="avatar" id="avatarBtn">
            <img id="ava" src="" alt="ava">
        </div>
        
        <div class="menu-buttons">
            <button class="menu-btn">Fast Game</button>
            <button class="menu-btn">Slots</button>
            <button class="menu-btn">Bonus</button>
            <button class="menu-btn">Profile</button>
            <button class="menu-btn">Fight</button>
        </div>
        
        <div class="version">v1.0.7</div>
    </div>

    <audio id="music1" loop preload="auto">
        <source src="music.mp3" type="audio/mpeg">
    </audio>
    <audio id="music2" loop preload="auto">
        <source src="music2.mp3" type="audio/mpeg">
    </audio>

    <script>
        // Инициализация Telegram WebApp
        let tg = null;
        try {
            if (window.Telegram?.WebApp) {
                tg = window.Telegram.WebApp;
                tg.expand();
            } else {
                const script = document.createElement('script');
                script.src = 'https://telegram.org/js/telegram-web-app.js';
                script.onload = () => {
                    tg = window.Telegram.WebApp;
                    if (tg) tg.expand();
                };
                document.head.appendChild(script);
            }
        } catch(e) {
            console.log('Telegram not available');
        }
        
        const m1 = document.getElementById('music1');
        const m2 = document.getElementById('music2');
        
        // ГРОМКОСТЬ: первая на 50% больше (0.75), вторая на 50% меньше (0.25)
        m1.volume = 0.75;
        m2.volume = 0.25;
        
        let audioStarted = false;
        let currentMusic = 'm1';
        
        function initAudio() {
            if (!audioStarted) {
                m1.play().then(() => {
                    audioStarted = true;
                    currentMusic = 'm1';
                    console.log('Music 1 started at 75% volume');
                }).catch(e => {
                    console.log('Autoplay blocked');
                });
            }
        }
        
        function switchToMusic2() {
            if (currentMusic === 'm1' && audioStarted) {
                m1.pause();
                m2.play().then(() => {
                    currentMusic = 'm2';
                    console.log('Switched to music 2 at 25% volume');
                }).catch(e => console.log('Could not switch to music 2'));
            }
        }
        
        setTimeout(() => {
            initAudio();
        }, 100);
        
        document.body.addEventListener('click', initAudio);
        document.body.addEventListener('touchstart', initAudio);
        
        function triggerFilm() {
            const film = document.getElementById('film-chaos');
            film.innerHTML = '';
            
            const dustCount = Math.floor(Math.random() * 4) + 3;
            for(let i = 0; i < dustCount; i++) {
                const d = document.createElement('div');
                d.className = 'dust';
                const s = Math.random() * 6 + 2;
                d.style.cssText = `
                    width: ${s}px;
                    height: ${s}px;
                    left: ${Math.random() * 100}%;
                    top: ${Math.random() * 100}%;
                    animation-duration: ${Math.random() * 0.8 + 0.6}s;
                `;
                film.appendChild(d);
            }
            
            if (Math.random() > 0.7) {
                const sc = document.createElement('div');
                sc.className = 'scratch';
                sc.style.left = Math.random() * 100 + '%';
                sc.style.height = Math.random() * 60 + 20 + '%';
                sc.style.top = Math.random() * 40 + 20 + '%';
                sc.style.animationDuration = (Math.random() * 0.8 + 0.7) + 's';
                film.appendChild(sc);
            }
            
            setTimeout(() => {
                if (film.children.length > 20) {
                    film.innerHTML = '';
                }
            }, 1000);
        }
        
        setInterval(triggerFilm, Math.random() * 400 + 800);
        
        setInterval(() => {
            if (Math.random() > 0.8) {
                const flicker = document.createElement('div');
                flicker.style.cssText = `
                    position: fixed;
                    inset: 0;
                    background: rgba(255,255,255,0.03);
                    pointer-events: none;
                    z-index: 520;
                    animation: fadeOut 0.3s ease-out forwards;
                `;
                document.body.appendChild(flicker);
                setTimeout(() => flicker.remove(), 300);
            }
        }, 2000);
        
        let p = 0;
        const loadInt = setInterval(() => {
            p += 1.43;
            const bar = document.getElementById('bar');
            if (bar) bar.style.width = Math.min(p, 100) + '%';
            
            if (p >= 100) {
                clearInterval(loadInt);
                finishLoading();
            }
        }, 100);
        
        function finishLoading() {
            switchToMusic2();
            
            const loadingScreen = document.getElementById('loading-screen');
            loadingScreen.style.opacity = '0';
            
            setTimeout(() => {
                loadingScreen.style.display = 'none';
                const mainMenu = document.getElementById('main-menu');
                mainMenu.style.display = 'block';
                setTimeout(() => {
                    mainMenu.style.opacity = '1';
                }, 50);
                loadAvatar();
            }, 500);
        }
        
        function loadAvatar() {
            const img = document.getElementById('ava');
            let user = null;
            
            try {
                if (tg?.initDataUnsafe?.user) {
                    user = tg.initDataUnsafe.user;
                }
            } catch(e) {}
            
            if (user && user.photo_url) {
                img.src = user.photo_url;
                console.log('Avatar from Telegram');
                return;
            }
            
            const avatarFiles = [
                'avatar.png', 'avatar.jpg', 'avatar.jpeg',
                'profile.png', 'profile.jpg',
                'user.png', 'user.jpg',
                'photo.png', 'photo.jpg',
                '1.png', '2.png', '3.png'
            ];
            
            let found = false;
            const saved = localStorage.getItem('cartoon_ava');
            
            if (saved) {
                const testImg = new Image();
                testImg.onload = () => {
                    if (!found) {
                        found = true;
                        img.src = saved;
                        console.log('Avatar from localStorage:', saved);
                    }
                };
                testImg.src = saved;
            }
            
            avatarFiles.forEach((file) => {
                const testImg = new Image();
                testImg.onload = () => {
                    if (!found) {
                        found = true;
                        img.src = file;
                        localStorage.setItem('cartoon_ava', file);
                        console.log('Avatar loaded:', file);
                    }
                };
                testImg.src = file;
            });
            
            setTimeout(() => {
                if (!found && (!img.src || img.src === '')) {
                    generateRubberHoseAvatar(img);
                }
            }, 500);
        }
        
        function generateRubberHoseAvatar(imgElement) {
            const canvas = document.createElement('canvas');
            canvas.width = 60;
            canvas.height = 60;
            const ctx = canvas.getContext('2d');
            
            ctx.fillStyle = '#FFD966';
            ctx.beginPath();
            ctx.arc(30, 30, 28, 0, Math.PI * 2);
            ctx.fill();
            
            ctx.fillStyle = '#fff';
            ctx.beginPath();
            ctx.arc(18, 22, 6, 0, Math.PI * 2);
            ctx.fill();
            ctx.beginPath();
            ctx.arc(42, 22, 6, 0, Math.PI * 2);
            ctx.fill();
            
            ctx.fillStyle = '#663300';
            ctx.beginPath();
            ctx.arc(30, 38, 12, 0, Math.PI);
            ctx.fill();
            
            ctx.fillStyle = '#000';
            ctx.beginPath();
            ctx.arc(16, 20, 2.5, 0, Math.PI * 2);
            ctx.fill();
            ctx.beginPath();
            ctx.arc(40, 20, 2.5, 0, Math.PI * 2);
            ctx.fill();
            
            ctx.fillStyle = '#fff';
            ctx.beginPath();
            ctx.arc(14, 18, 1, 0, Math.PI * 2);
            ctx.fill();
            ctx.beginPath();
            ctx.arc(38, 18, 1, 0, Math.PI * 2);
            ctx.fill();
            
            imgElement.src = canvas.toDataURL();
            console.log('Generated Rubber Hose avatar');
        }
        
        // Обработка кликов на кнопки
        document.querySelectorAll('.menu-btn').forEach(btn => {
            btn.addEventListener('click', () => {
                console.log(`Button clicked: ${btn.textContent}`);
            });
        });
        
        m1.addEventListener('error', () => console.log('music.mp3 not found'));
        m2.addEventListener('error', () => console.log('music2.mp3 not found'));
        
        console.log('App loaded - v1.0.7 | Music volumes: first 75%, second 25%');
    </script>
</body>
</html>
