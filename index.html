<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cuphead Loading Screen</title>
    <style>
        body, html {
            margin: 0; padding: 0;
            width: 100%; height: 100%;
            background-color: #050505;
            overflow: hidden;
            display: flex; justify-content: center; align-items: center;
        }

        /* КОНТЕЙНЕР ЭФФЕКТОВ ПЛЕНКИ */
        .film-grain {
            position: fixed; top: 0; left: 0;
            width: 100%; height: 100%;
            pointer-events: none;
            z-index: 50;
        }

        /* 1. Пылинки и пятна (как на твоем фото) */
        .film-grain::before {
            content: "";
            position: absolute; top: -50%; left: -50%;
            width: 200%; height: 200%;
            background-image: 
                radial-gradient(circle, #fff 1px, transparent 1px),
                radial-gradient(circle, #fff 2px, transparent 2px);
            background-size: 300px 300px, 450px 450px;
            opacity: 0.15;
            animation: dust-move 0.2s steps(4) infinite;
        }

        /* 2. Дрожащие вертикальные полоски */
        .film-grain::after {
            content: "";
            position: absolute; top: 0; left: 0;
            width: 100%; height: 100%;
            background: linear-gradient(90deg, 
                transparent 20%, rgba(255,255,255,0.05) 21%, transparent 22%,
                transparent 70%, rgba(255,255,255,0.07) 71%, transparent 72%);
            animation: scratches 0.15s infinite;
        }

        /* 3. Эффект зернистости (Noise) через SVG */
        .noise-overlay {
            position: fixed; top: 0; left: 0;
            width: 100%; height: 100%;
            opacity: 0.08;
            z-index: 60;
            pointer-events: none;
            background: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://w3.org id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.65' numOctaves='3' stitchTiles='stitch'/%3E%3C/feTurbulence%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
        }

        /* ТЕКСТ */
        .content {
            position: relative; z-index: 10;
            text-align: center;
        }

        .title {
            color: #eee;
            font-family: 'serif';
            font-size: 3.5rem;
            font-weight: 900;
            text-transform: uppercase;
            letter-spacing: 3px;
            animation: rubber-hose 0.6s infinite ease-in-out alternate;
            filter: contrast(150%) brightness(120%);
        }

        /* АНИМАЦИИ */
        @keyframes dust-move {
            0% { transform: translate(0, 0); }
            25% { transform: translate(5%, -5%); }
            50% { transform: translate(-10%, 10%); }
            75% { transform: translate(15%, -15%); }
            100% { transform: translate(-5%, 5%); }
        }

        @keyframes scratches {
            0% { transform: translateX(0); opacity: 0.5; }
            50% { transform: translateX(5px); opacity: 0.8; }
            100% { transform: translateX(-5px); opacity: 0.5; }
        }

        @keyframes rubber-hose {
            from { transform: scaleY(1) translateY(0); }
            to { transform: scaleY(1.08) translateY(-15px); }
        }

        /* Виньетка для глубины */
        .vignette {
            position: fixed; top: 0; left: 0;
            width: 100%; height: 100%;
            background: radial-gradient(circle, transparent 30%, black 140%);
            z-index: 70; pointer-events: none;
        }
    </style>
</head>
<body>

    <div class="film-grain"></div>
    <div class="noise-overlay"></div>
    <div class="vignette"></div>

    <div class="content">
        <h1 class="title">Cartoon<br>Game</h1>
    </div>

</body>
</html>
