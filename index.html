<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Cartoon Game - Noir Pro Roulette</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Luckiest+Guy&display=swap');

        :root { 
            --bg: #000; --text: #fff; --font: 'Luckiest Guy', cursive;
            --spring: cubic-bezier(0.68, -0.6, 0.32, 1.6);
            --soft: cubic-bezier(0.175, 0.885, 0.32, 1.275);
            --red: #b31d1d; --black: #1a1a1a; --green: #2d7a2d;
        }

        body, html { margin:0; padding:0; width:100%; height:100%; background:var(--bg); color:var(--text); font-family:var(--font); overflow:hidden; user-select:none; }

        .noise { position:fixed; inset:0; opacity:0.12; pointer-events:none; z-index:2000; background:url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.8' numOctaves='3'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E"); }
        .vignette { position:fixed; inset:0; background:radial-gradient(circle, transparent 20%, black 150%); z-index:2001; pointer-events:none; }

        .btn-cartoon { background:#000; color:#fff; border:4px solid #fff; padding:8px 15px; font-family:var(--font); font-size:0.8rem; border-radius:15px; cursor:pointer; text-transform:uppercase; box-shadow:0 4px 0 #333; transition:0.3s var(--spring); }

        /* ЭКРАНЫ */
        .modal { position:fixed; inset:0; background:#000; display:none; flex-direction:column; z-index:800; }
        .modal.show { display:flex; }

        .roulette-screen { position:relative; height:100%; display:flex; flex-direction:column; overflow:hidden; }
        
        /* Таймер: Слева на ПК, Слева вверху на телефоне */
        .timer-val { position: absolute; z-index: 1000; color: #ff0; text-shadow: 3px 3px 0 #000; pointer-events: none; }
        @media (min-width: 1024px) { .timer-val { left: 50px; top: 50%; transform: translateY(-50%); font-size: 5rem; } }
        @media (max-width: 1023px) { .timer-val { left: 20px; top: 20px; font-size: 2.5rem; } }

        .roulette-header { display:flex; justify-content:space-between; padding:15px; z-index:100; align-items: center; }

        .wheel-area { flex:1; display:flex; flex-direction:column; align-items:center; justify-content:center; position:relative; }
        .mickey-side { width:80px; height:100px; position:absolute; left:10px; bottom:150px; background:url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 120"><circle cx="50" cy="50" r="30" fill="white" stroke="black" stroke-width="4"/><circle cx="25" cy="25" r="15" fill="black"/><circle cx="75" cy="25" r="15" fill="black"/><ellipse cx="40" cy="45" rx="5" ry="8" fill="black"/><ellipse cx="60" cy="45" rx="5" ry="8" fill="black"/><path d="M35 70 Q50 85 65 70" fill="none" stroke="black" stroke-width="3" stroke-linecap="round"/></svg>') no-repeat center; animation: bounce 0.5s infinite alternate; z-index: 5; }
        @keyframes bounce { from { transform:translateY(0); } to { transform:translateY(-10px); } }

        /* КОЛЕСО */
        .wheel-wrap { position:relative; border:10px solid #fff; border-radius:50%; box-shadow:0 0 40px rgba(255,255,255,0.2); z-index: 2; }
        @media (min-width: 1024px) { .wheel-wrap { width: 450px; height: 450px; } }
        @media (max-width: 1023px) { .wheel-wrap { width: 300px; height: 300px; } }
        
        #wheel { width:100%; height:100%; border-radius:50%; transition:transform 4s cubic-bezier(0.1, 0, 0.1, 1); background:#222; position: relative; }
        
        /* СТРЕЛКА НАД КОЛЕСОМ */
        .wheel-ptr { position:absolute; top:-10px; left:50%; transform:translateX(-50%); width:30px; height:40px; background:#fff; clip-path:polygon(50% 100%, 0 0, 100% 0); z-index:10; border: 2px solid #000; }

        /* СТОЛ СТАВОК (ПЕРЕКРЫВАЕТ КОЛЕСО) */
        .bet-board { 
            position:absolute; bottom:0; width:100%; background:rgba(0,0,0,0.9); border-top:6px solid #fff; 
            border-radius:40px 40px 0 0; transition: transform 0.6s var(--spring); 
            padding:10px 5px 120px; box-sizing:border-box; z-index:150;
            transform: translateY(100%);
        }
        .bet-board.active { transform: translateY(10%); /* Выше, перекрывая колесо */ }
        
        /* Сетка как на картинке */
        .board-layout { display:flex; gap:5px; justify-content:center; max-width:450px; margin:0 auto; transform: scale(0.85); transform-origin: top; }
        .num-grid-container { display: flex; flex-direction: column; flex: 1; }
        .num-grid { display:grid; grid-template-columns: repeat(3, 1fr); gap:4px; }
        .side-panel { display:flex; flex-direction:column; gap:4px; width:70px; }
        .column-bets { display: grid; grid-template-columns: repeat(3, 1fr); gap: 4px; margin-top: 4px; }

        .cell { height:38px; border:2px solid #fff; border-radius:8px; display:flex; align-items:center; justify-content:center; position:relative; cursor:pointer; font-size:0.9rem; transition: 0.1s; }
        .cell.green { background:var(--green); border-radius: 40% 40% 0 0; height:45px; font-size: 1.3rem; margin-bottom: 4px; }
        .cell.red { background:var(--red); }
        .cell.black { background:var(--black); }
        .cell.outside { background:#111; font-size:0.6rem; height:45px; text-transform: uppercase; }
        .cell.col-bet { background: #222; font-size: 0.7rem; height: 35px; }

        .chip-on-board { position:absolute; width:24px; height:24px; background:#fff; border:2px solid #000; border-radius:50%; color:#000; font-size:8px; display:flex; align-items:center; justify-content:center; z-index:10; pointer-events:none; }

        /* УПРАВЛЕНИЕ */
        .controls { position:fixed; bottom:95px; right:20px; display:flex; flex-direction:column; align-items:center; gap:12px; z-index:200; }
        .undo-btn { width:55px; height:55px; background:#fff; color:#000; border:4px solid #000; border-radius:50%; font-size:2.2rem; cursor:pointer; display:flex; align-items:center; justify-content:center; box-shadow:0 4px 0 #333; }
        
        .chip-sel { width:80px; height:80px; background:#111; border:5px solid #fff; border-radius:50%; display:flex; align-items:center; justify-content:center; cursor:pointer; position:relative; }
        .chip-sel::after { content:''; position:absolute; inset:0; border:8px dashed #fff; border-radius:50%; }
        
        .sub-chip-list { position:absolute; bottom:0; left:0; width:100%; height:100%; pointer-events:none; }
        .sub-chip { position:absolute; width:60px; height:60px; border:4px solid #fff; border-radius:50%; background:#222; display:flex; align-items:center; justify-content:center; opacity:0; transition:0.5s var(--spring); transform:scale(0); font-size:0.8rem; pointer-events:auto; }
        .active .sub-chip { opacity:1; transform:scale(1); }

        .win-stats-feed { position:absolute; top:85px; left:50%; transform: translateX(-50%); font-size:0.9rem; color:#ffd966; text-align:center; width:100%; z-index: 10; }

        #res-pop { position:fixed; top:50%; left:50%; transform:translate(-50%,-50%) scale(0); background:#fff; border:8px solid #000; border-radius:30px; padding:25px; z-index:3000; text-align:center; color:#000; transition:0.6s var(--spring); width:240px; }
        #res-pop img { width:150px; height:150px; border:5px solid #000; border-radius:20px; object-fit:cover; margin-bottom:15px; }
        #res-pop.show { transform:translate(-50%,-50%) scale(1); }

        .menu-bar { position:fixed; bottom:20px; width:100%; display:flex; justify-content:center; gap:8px; z-index:100; padding:0 10px; box-sizing:border-box; }
        #fast-game-sub { position:fixed; bottom:85px; left:50%; transform:translateX(-50%) scale(0); background:#000; border:5px solid #fff; border-radius:20px; padding:10px; display:flex; gap:10px; transition:0.4s var(--spring); transform-origin:bottom; z-index:100; }
        #fast-game-sub.active { transform:translateX(-50%) scale(1); }
    </style>
</head>
<body onclick="initAudio()">

    <div class="noise"></div>
    <div class="vignette"></div>

    <audio id="music1" loop><source src="music.mp3" type="audio/mpeg"></audio>
    <audio id="music2" loop><source src="music2.mp3" type="audio/mpeg"></audio>

    <div id="loading-screen" style="position:fixed; inset:0; background:#000; z-index:2000; display:flex; flex-direction:column; justify-content:center; align-items:center;">
        <h1 style="font-size:4rem; text-align:center;">CARTOON<br>GAME</h1>
        <div style="width:200px; height:12px; border:4px solid #fff; border-radius:10px; margin-top:30px; overflow:hidden;">
            <div id="bar" style="height:100%; width:0%; background:#fff;"></div>
        </div>
    </div>

    <!-- MAIN MENU -->
    <div id="main-menu" style="display:none; height:100vh;">
        <div style="display:flex; justify-content:space-between; padding:20px; align-items:center;">
            <div style="font-size:2.2rem;">$<span id="bal-val">1000</span></div>
            <div id="avaBtn" style="width:70px; height:70px; border:5px solid #fff; border-radius:50%; overflow:hidden; cursor:pointer;"><img id="m-ava" src="" style="width:100%; height:100%; object-fit:cover;"></div>
        </div>
        <div id="fast-game-sub"><button class="btn-cartoon" id="openRoulette">ROULETTE</button><button class="btn-cartoon" id="openDice">DICE</button></div>
        <div class="menu-bar">
            <button class="btn-cartoon" id="fastGameBtn">FAST GAME</button>
            <button class="btn-cartoon">SLOTS</button><button class="btn-cartoon">BONUS</button><button class="btn-cartoon" id="statBtn">STAT</button>
        </div>
    </div>

    <!-- ROULETTE MODAL -->
    <div id="rouletteModal" class="modal">
        <div class="roulette-screen">
            <div class="timer-val" id="roulTimer">10</div>
            <div class="roulette-header">
                <div style="font-size: 1.8rem;">$<span id="roul-bal">1000</span></div>
                <button class="btn-cartoon" onclick="exitRoul()">EXIT</button>
            </div>
            <div class="win-stats-feed" id="roulFeed"></div>
            <div class="wheel-area">
                <div class="mickey-side"></div>
                <div class="wheel-wrap">
                    <div class="wheel-ptr"></div>
                    <div id="wheel"></div>
                </div>
            </div>

            <!-- УПРАВЛЕНИЕ -->
            <div class="controls">
                <button class="undo-btn" id="undoBet">↩</button>
                <div class="chip-sel" id="mainChip">
                    <span id="curBetTxt">$0.1</span>
                    <div class="sub-chip-list" id="radialChips">
                        <div class="sub-chip" data-val="0.1">$0.1</div>
                        <div class="sub-chip" data-val="0.5">$0.5</div>
                        <div class="sub-chip" data-val="1">$1</div>
                        <div class="sub-chip" data-val="5">$5</div>
                        <div class="sub-chip" data-val="10">$10</div>
                    </div>
                </div>
            </div>

            <!-- ПОЛЕ СТАВОК (ДИЗАЙН С ФОТО) -->
            <div class="bet-board active" id="betBoard">
                <div class="board-layout">
                    <!-- Левая вертикальная панель -->
                    <div class="side-panel">
                        <div class="cell outside" data-target="1-18">1to18</div>
                        <div class="cell outside" data-target="even">EVEN</div>
                        <div class="cell outside" style="background:var(--red)" data-target="red">RED</div>
                        <div class="cell outside" style="background:var(--black)" data-target="black">BLACK</div>
                        <div class="cell outside" data-target="odd">ODD</div>
                        <div class="cell outside" data-target="19-36">19to36</div>
                    </div>
                    <!-- Центральная сетка -->
                    <div class="num-grid-container">
                        <div class="cell green" data-target="0">0</div>
                        <div class="num-grid" id="numGrid"></div>
                        <!-- Нижние ставки -->
                        <div class="column-bets">
                            <div class="cell col-bet" data-target="col1">2to1</div>
                            <div class="cell col-bet" data-target="col2">2to1</div>
                            <div class="cell col-bet" data-target="col3">2to1</div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <div id="res-pop"><img id="res-img" src="" alt=""><div id="res-txt">WIN!</div></div>

    <script>
        let balance = 1000, betVal = 0.1, timer = 10, isRolling = false, activeBets = [], betHistory = [], audioStarted = false, lastWinsStats = { players: 0, amount: 0 }, gamesCount = 0;
        const m1 = document.getElementById('music1'), m2 = document.getElementById('music2');

        function initAudio() { if(!audioStarted) { m1.volume=0.4; m2.volume=0.4; m1.play(); audioStarted=true; } }
        function switchMusic() { m1.pause(); m2.play(); }

        function setupRoulette() {
            const wheel = document.getElementById('wheel'), grid = document.getElementById('numGrid');
            const nums = [0, 32, 15, 19, 4, 21, 2, 25, 17, 34, 6, 27, 13, 36, 11, 30, 8, 23, 10, 5, 24, 16, 33, 1, 20, 14, 31, 9, 22, 18, 29, 7, 28, 12, 35, 3, 26];
            wheel.innerHTML = '';
            nums.forEach((n, i) => {
                const angle = (360 / 37) * i;
                const color = n === 0 ? '#2d7a2d' : (i % 2 === 0 ? '#1a1a1a' : '#b31d1d');
                const div = document.createElement('div');
                div.style.cssText = `position:absolute; width:100%; height:100%; transform:rotate(${angle}deg); text-align:center; color:#fff; font-size:12px; padding-top:10px; border-left:1px solid rgba(255,255,255,0.1); background: conic-gradient(from -5deg, transparent 0, ${color} 10deg, transparent 10deg);`;
                div.innerText = n; wheel.appendChild(div);
            });
            grid.innerHTML = '';
            // Создаем 12 рядов по 3 числа
            for(let row=0; row<12; row++) {
                for(let col=1; col<=3; col++) {
                    let n = row * 3 + col;
                    const cell = document.createElement('div');
                    // Стандартные цвета рулетки
                    const reds = [1,3,5,7,9,12,14,16,18,19,21,23,25,27,30,32,34,36];
                    cell.className = `cell ${reds.includes(n) ? 'red' : 'black'}`;
                    cell.innerText = n; cell.dataset.target = n;
                    grid.appendChild(cell);
                }
            }
            document.querySelectorAll('.cell').forEach(el => el.onclick = () => placeBet(el));
        }

        function placeBet(el) {
            if(isRolling || timer <= 0) return;
            const target = el.dataset.target;
            if(target === 'even' && activeBets.some(b => b.target === 'odd')) return;
            if(target === 'odd' && activeBets.some(b => b.target === 'even')) return;
            if(target === 'red' && activeBets.some(b => b.target === 'black')) return;
            if(target === 'black' && activeBets.some(b => b.target === 'red')) return;
            if(balance < betVal) return;
            balance -= betVal;
            let existing = activeBets.find(b => b.target === target);
            if(existing) {
                existing.amount += betVal;
                existing.el.innerText = existing.amount.toFixed(1);
            } else {
                if(activeBets.length >= 5) { balance += betVal; return alert("MAX 5 SLOTS!"); }
                const chip = document.createElement('div');
                chip.className = 'chip-on-board'; chip.innerText = betVal.toFixed(1);
                el.appendChild(chip);
                existing = { target, amount: betVal, el: chip };
                activeBets.push(existing);
            }
            betHistory.push({ target, amount: betVal });
            updateUI();
        }

        document.getElementById('undoBet').onclick = () => {
            if(isRolling || betHistory.length === 0) return;
            const last = betHistory.pop();
            const bObj = activeBets.find(b => b.target === last.target);
            balance += last.amount; bObj.amount -= last.amount;
            if(bObj.amount <= 0) { bObj.el.remove(); activeBets = activeBets.filter(b => b.target !== last.target); }
            else bObj.el.innerText = bObj.amount.toFixed(1);
            updateUI();
        };

        function startTimer() {
            const timerEl = document.getElementById('roulTimer'), board = document.getElementById('betBoard'), feed = document.getElementById('roulFeed');
            if(gamesCount > 0) feed.innerText = `${lastWinsStats.players} players won $${lastWinsStats.amount.toFixed(1)} last round`;
            const countdown = setInterval(() => {
                timer--; timerEl.innerText = timer;
                if(timer <= 0) { clearInterval(countdown); board.classList.remove('active'); spinWheel(); }
            }, 1000);
        }

        function spinWheel() {
            isRolling = true;
            const wheel = document.getElementById('wheel');
            const nums = [0, 32, 15, 19, 4, 21, 2, 25, 17, 34, 6, 27, 13, 36, 11, 30, 8, 23, 10, 5, 24, 16, 33, 1, 20, 14, 31, 9, 22, 18, 29, 7, 28, 12, 35, 3, 26];
            let resIdx, resNum;
            if(Math.random() < 0.01) { resNum = 0; resIdx = 0; }
            else { resIdx = Math.floor(Math.random()*36) + 1; resNum = nums[resIdx]; }
            const rot = (360 * 5) + (resIdx * (360/37));
            wheel.style.transform = `rotate(-${rot}deg)`;
            setTimeout(() => {
                isRolling = false; processRoulResult(resNum);
                wheel.style.transition = 'none'; wheel.style.transform = `rotate(-${resIdx * (360/37)}deg)`;
                setTimeout(() => { wheel.style.transition = 'transform 4s cubic-bezier(0.1, 0, 0.1, 1)'; timer = 10; activeBets.forEach(b => b.el.remove()); activeBets = []; betHistory = []; document.getElementById('betBoard').classList.add('active'); startTimer(); }, 100);
            }, 4500);
        }

        function processRoulResult(res) {
            let userWin = 0;
            const reds = [1,3,5,7,9,12,14,16,18,19,21,23,25,27,30,32,34,36];
            activeBets.forEach(bet => {
                let win = false, mult = 0;
                if(bet.target == res) { win = true; mult = res == 0 ? 20 : 10; }
                else if(bet.target === 'even' && res !== 0 && res % 2 === 0) { win = true; mult = 2; }
                else if(bet.target === 'odd' && res % 2 !== 0) { win = true; mult = 2; }
                else if(bet.target === 'red' && reds.includes(res)) { win = true; mult = 2; }
                else if(bet.target === 'black' && !reds.includes(res) && res !== 0) { win = true; mult = 2; }
                else if(bet.target === '1-18' && res >= 1 && res <= 18) { win = true; mult = 2; }
                else if(bet.target === '19-36' && res >= 19 && res <= 36) { win = true; mult = 2; }
                else if(bet.target === 'col1' && res % 3 === 1) { win = true; mult = 3; }
                else if(bet.target === 'col2' && res % 3 === 2) { win = true; mult = 3; }
                else if(bet.target === 'col3' && res % 3 === 0 && res !== 0) { win = true; mult = 3; }
                if(win) userWin += bet.amount * mult;
            });
            lastWinsStats.players = Math.floor(Math.random() * 20); lastWinsStats.amount = Math.random() * 60;
            if(userWin > 0) { lastWinsStats.players++; lastWinsStats.amount += userWin; }
            const pop = document.getElementById('res-pop'), img = document.getElementById('res-img'), txt = document.getElementById('res-txt');
            if(userWin > 0) { balance += userWin; img.src = "Dicewin.gif"; txt.innerText = "WON $" + userWin.toFixed(1); }
            else { img.src = "Dicelose.jpg"; txt.innerText = "LOST!"; }
            pop.classList.add('show'); setTimeout(() => pop.classList.remove('show'), 2500);
            gamesCount++; updateUI();
        }

        const mainChip = document.getElementById('mainChip'), radial = document.getElementById('radialChips');
        mainChip.onclick = (e) => {
            e.stopPropagation(); const act = radial.classList.toggle('active');
            radial.querySelectorAll('.sub-chip').forEach((c, i) => {
                if(act) { const angle = (i * 40) - 120; c.style.transform = `translate(${Math.cos(angle*Math.PI/180)*110}px, ${Math.sin(angle*Math.PI/180)*110}px) scale(1)`; }
                else c.style.transform = 'translate(0,0) scale(0)';
            });
        };
        radial.querySelectorAll('.sub-chip').forEach(sc => {
            sc.onclick = (e) => { e.stopPropagation(); betVal = parseFloat(sc.dataset.val); document.getElementById('curBetTxt').innerText = '$' + betVal; radial.classList.remove('active'); };
        });

        function updateUI() { document.getElementById('bal-val').innerText = balance.toFixed(2); document.getElementById('roul-bal').innerText = balance.toFixed(2); }
        function exitRoul() { if(isRolling) return; document.getElementById('rouletteModal').classList.remove('show'); }
        document.getElementById('fastGameBtn').onclick = (e) => { e.stopPropagation(); document.getElementById('fast-game-sub').classList.toggle('active'); };
        document.getElementById('openRoulette').onclick = () => { document.getElementById('rouletteModal').classList.add('show'); setupRoulette(); timer = 10; startTimer(); };
        window.onclick = () => { document.getElementById('fast-game-sub').classList.remove('active'); radial.classList.remove('active'); };

        let p = 0;
        const loader = setInterval(() => {
            p += 5; document.getElementById('bar').style.width = p + '%';
            if(p >= 100) { clearInterval(loader); switchMusic(); document.getElementById('loading-screen').style.display = 'none'; document.getElementById('main-menu').style.display = 'block'; setTimeout(() => document.getElementById('main-menu').style.opacity = '1', 50); document.getElementById('m-ava').src = localStorage.getItem('userAva') || '1.png'; updateUI(); }
        }, 40);
    </script>
</body>
</html>
