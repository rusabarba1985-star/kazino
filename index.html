<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Cartoon Game - Rubber Hose Edition</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Luckiest+Guy&display=swap');

        :root { 
            --bg: #000; --text: #fff; --font-main: 'Luckiest Guy', cursive;
            --spring: cubic-bezier(0.68, -0.6, 0.32, 1.6);
            --soft-spring: cubic-bezier(0.175, 0.885, 0.32, 1.275);
            --grey: #555; --black: #1a1a1a; --white: #fff;
        }

        body, html { 
            margin: 0; padding: 0; width: 100%; height: 100%; 
            background: var(--bg); color: var(--text); 
            font-family: var(--font-main); overflow: hidden; user-select: none;
            touch-action: manipulation;
        }

        /* ПЛЕНКА */
        .noise { position: fixed; inset: 0; opacity: 0.15; pointer-events: none; z-index: 2000; background: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.8' numOctaves='3'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E"); }
        .vignette { position: fixed; inset: 0; background: radial-gradient(circle, transparent 20%, black 150%); z-index: 2001; pointer-events: none; }

        /* ЗАГРУЗКА */
        #loading-screen { position: fixed; inset: 0; background: #000; display: flex; flex-direction: column; justify-content: center; align-items: center; z-index: 3000; }
        .loading-title { font-size: 3rem; text-align: center; animation: title-jump 0.8s infinite var(--spring); }
        @keyframes title-jump { 0%, 100% { transform: scale(1) rotate(-3deg); } 50% { transform: scale(1.1) rotate(3deg); } }

        /* ГЛАВНОЕ МЕНЮ (КНОПКИ В РЯД) */
        #main-menu { display: none; height: 100vh; position: relative; opacity: 0; transition: 0.8s; }
        .header { display: flex; justify-content: space-between; padding: 15px; align-items: center; }
        .balance-box { font-size: 1.8rem; text-shadow: 3px 3px 0 #333; }
        .avatar-box { width: 60px; height: 60px; border: 4px solid #fff; border-radius: 50%; overflow: hidden; }

        .menu-buttons-container {
            position: absolute; bottom: 20px; width: 100%;
            display: flex; justify-content: center; gap: 8px; padding: 0 10px; box-sizing: border-box;
        }

        .btn-cartoon {
            background: #000; color: #fff; border: 4px solid #fff;
            padding: 8px 12px; font-family: var(--font-main); font-size: 0.8rem;
            border-radius: 15px; cursor: pointer; text-transform: uppercase;
            box-shadow: 0 4px 0 #333; transition: 0.2s; white-space: nowrap;
        }
        .btn-cartoon:active { transform: translateY(3px); box-shadow: 0 1px 0 #333; }

        #fast-game-sub {
            position: absolute; bottom: 80px; left: 50%; transform: translateX(-50%) scale(0);
            background: #000; border: 5px solid #fff; border-radius: 20px; padding: 10px;
            display: flex; gap: 10px; transition: transform 0.4s var(--spring); transform-origin: bottom;
        }
        #fast-game-sub.active { transform: translateX(-50%) scale(1); }

        /* РУЛЕТКА МОДАЛКА */
        .modal { position: fixed; inset: 0; background: #000; display: none; flex-direction: column; z-index: 1500; overflow: hidden; }
        .modal.show { display: flex; }

        .roulette-top { display: flex; align-items: center; justify-content: center; height: 40%; position: relative; gap: 20px; }
        .ruolet-gif { width: 120px; height: 120px; border: 4px solid #fff; border-radius: 15px; object-fit: cover; }
        
        .wheel-container { position: relative; width: 220px; height: 220px; border: 8px solid #fff; border-radius: 50%; }
        #wheel { width: 100%; height: 100%; border-radius: 50%; transition: transform 5s cubic-bezier(0.1, 0, 0.1, 1); background: #222; }
        .wheel-arrow { position: absolute; top: -15px; left: 50%; transform: translateX(-50%); width: 25px; height: 35px; background: #fff; clip-path: polygon(50% 100%, 0 0, 100% 0); z-index: 10; border: 2px solid #000; }

        /* ПОЛЕ СТАВОК (ВЫДВИЖНОЕ) */
        .bet-board {
            position: absolute; bottom: 0; width: 100%; height: 75%; background: rgba(0,0,0,0.95);
            border-top: 6px solid #fff; border-radius: 30px 30px 0 0;
            transition: transform 0.6s var(--spring); transform: translateY(105%); z-index: 1600;
            display: flex; flex-direction: column; padding: 10px; box-sizing: border-box;
        }
        .bet-board.active { transform: translateY(10%); }
        .bet-board.hide-anim { animation: spring-down 0.8s forwards; }
        @keyframes spring-down { 0% { transform: translateY(10%); } 20% { transform: translateY(0%); } 100% { transform: translateY(105%); } }

        /* СЕТКА СТАВОК (ПО ФОТО) */
        .grid-layout { display: flex; gap: 5px; height: 280px; justify-content: center; transform: scale(0.9); transform-origin: top; }
        .side-bets { display: grid; grid-template-rows: repeat(6, 1fr); gap: 4px; width: 60px; }
        .main-grid-area { display: flex; flex-direction: column; flex: 1; max-width: 240px; }
        .zero-cell { height: 40px; background: var(--white); border: 2px solid #000; color: #000; border-radius: 40% 40% 0 0; display: flex; align-items: center; justify-content: center; font-size: 1.2rem; }
        .numbers-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 4px; flex: 1; }
        .dozen-bets { display: grid; grid-template-columns: repeat(3, 1fr); gap: 4px; margin-top: 4px; height: 35px; }

        .cell { border: 2px solid #fff; border-radius: 8px; display: flex; align-items: center; justify-content: center; font-size: 0.8rem; cursor: pointer; position: relative; }
        .cell.grey { background: var(--grey); }
        .cell.black { background: var(--black); }
        .cell.outside { background: #222; font-size: 0.6rem; }
        .cell.sum-chip::after { content: attr(data-sum); position: absolute; width: 22px; height: 22px; background: #fff; color: #000; border-radius: 50%; font-size: 8px; display: flex; align-items: center; justify-content: center; border: 1px solid #000; }

        /* УПРАВЛЕНИЕ */
        .bet-footer { position: fixed; bottom: 85px; width: 100%; display: flex; justify-content: center; align-items: center; gap: 20px; z-index: 1700; }
        .undo-btn { width: 45px; height: 45px; background: #fff; color: #000; border-radius: 50%; border: 3px solid #000; font-size: 1.5rem; display: flex; align-items: center; justify-content: center; }
        .chip-main { width: 70px; height: 70px; border: 4px solid #fff; border-radius: 50%; background: #111; display: flex; align-items: center; justify-content: center; position: relative; }
        .chip-main::after { content: ''; position: absolute; inset: 0; border: 6px dashed #fff; border-radius: 50%; }

        .stats-bar { position: absolute; bottom: 10px; width: 100%; text-align: center; font-size: 0.7rem; color: #ffd966; }

        /* РЕЗУЛЬТАТ */
        #res-popup { position: fixed; top: 40%; left: 50%; transform: translate(-50%, -50%) scale(0); background: #fff; color: #000; border: 8px solid #000; border-radius: 30px; padding: 20px; text-align: center; z-index: 2500; transition: 0.5s var(--spring); }
        #res-popup.show { transform: translate(-50%, -50%) scale(1); }
    </style>
</head>
<body onclick="initAudio()">

    <div class="noise"></div>
    <div class="vignette"></div>

    <audio id="music2" loop preload="auto"><source src="music2.mp3" type="audio/mpeg"></audio>

    <div id="loading-screen">
        <div class="loading-title">DRAWING<br>FRAMES...</div>
        <div style="width:200px; height:10px; border:3px solid #fff; border-radius:10px; margin-top:20px; overflow:hidden;">
            <div id="bar" style="width:0%; height:100%; background:#fff;"></div>
        </div>
    </div>

    <div id="main-menu">
        <div class="header">
            <div class="balance-box">$<span id="bal-val">1000</span></div>
            <div class="avatar-box" onclick="changeAva()"><img id="m-ava" src="" style="width:100%; height:100%; object-fit:cover;"></div>
        </div>
        <div id="fast-game-sub">
            <button class="btn-cartoon" id="openRoulette">ROULETTE</button>
            <button class="btn-cartoon" id="openDice">DICE</button>
        </div>
        <div class="menu-buttons-container">
            <button class="btn-cartoon" id="fastGameBtn">FAST GAME</button>
            <button class="btn-cartoon">SLOTS</button>
            <button class="btn-cartoon">BONUS</button>
            <button class="btn-cartoon" id="statBtn">STAT</button>
            <button class="btn-cartoon">FIGHT</button>
        </div>
    </div>

    <!-- ROULETTE MODAL -->
    <div id="rouletteModal" class="modal">
        <div style="display:flex; justify-content:space-between; padding:15px;">
            <div style="font-size:1.5rem;">$<span id="roul-bal">1000</span></div>
            <div id="roul-timer" style="font-size:2rem; color:#ff0;">15</div>
            <button class="btn-cartoon" onclick="hideModal('rouletteModal')">EXIT</button>
        </div>

        <div class="roulette-top" id="roulDisplay">
            <img src="ruolet.gif" class="ruolet-gif" alt="anim">
            <div class="wheel-container">
                <div class="wheel-arrow"></div>
                <div id="wheel"></div>
            </div>
        </div>

        <div class="bet-board" id="betBoard">
            <div class="grid-layout">
                <div class="side-bets">
                    <div class="cell outside" data-target="1-18">1to18</div>
                    <div class="cell outside" data-target="even">EVEN</div>
                    <div class="cell outside grey" data-target="grey">GREY</div>
                    <div class="cell outside black" data-target="black">BLACK</div>
                    <div class="cell outside" data-target="odd">ODD</div>
                    <div class="cell outside" data-target="19-36">19to36</div>
                </div>
                <div class="main-grid-area">
                    <div class="zero-cell cell" data-target="0" style="background:#fff; color:#000;">0</div>
                    <div class="numbers-grid" id="numGrid"></div>
                    <div class="dozen-bets">
                        <div class="cell outside" data-target="1st12">1st 12</div>
                        <div class="cell outside" data-target="2nd12">2nd 12</div>
                        <div class="cell outside" data-target="3rd12">3rd 12</div>
                    </div>
                </div>
                <div style="display:grid; grid-template-rows: repeat(3, 1fr); gap:4px; width:40px;">
                    <div class="cell outside" data-target="col1">2to1</div>
                    <div class="cell outside" data-target="col2">2to1</div>
                    <div class="cell outside" data-target="col3">2to1</div>
                </div>
            </div>
            
            <div class="bet-footer">
                <div class="undo-btn" onclick="undoBet()">↩</div>
                <div class="chip-main"><span>$0.1</span></div>
            </div>

            <div class="stats-bar" id="stats-info">24 players won $145 last round</div>
        </div>
    </div>

    <!-- DICE MODAL -->
    <div id="diceModal" class="modal" style="justify-content:center; align-items:center; background:rgba(0,0,0,0.9);">
        <div style="background:#000; border:6px solid #fff; border-radius:40px; padding:30px; text-align:center; width:85%;">
            <div id="the-dice" style="width:100px; height:100px; background:#fff; border:5px solid #000; border-radius:20px; color:#000; font-size:4rem; display:flex; align-items:center; justify-content:center; margin:0 auto 20px;">?</div>
            <div style="display:grid; grid-template-columns: 1fr 1fr; gap:10px; margin-bottom:20px;">
                <button class="btn-cartoon" onclick="playDice('even')">EVEN</button>
                <button class="btn-cartoon" onclick="playDice('odd')">ODD</button>
            </div>
            <button class="btn-cartoon" style="width:100%" onclick="hideModal('diceModal')">CLOSE</button>
        </div>
    </div>

    <div id="res-popup">
        <div id="res-num" style="font-size:3rem;">0</div>
        <div id="res-color" style="font-size:1rem; margin-bottom:10px;">WHITE</div>
        <div id="res-win" style="font-size:1.5rem; color:#0b0;"></div>
    </div>

    <script>
        let balance = 1000, betVal = 0.1, isRolling = false, audioStarted = false;
        let roulTimer = 15, activeBets = [], betHistory = [];

        function initAudio() { if(!audioStarted) { const m2=document.getElementById('music2'); m2.volume=0.4; m2.play(); audioStarted=true; } }

        // ИНИЦИАЛИЗАЦИЯ
        function setup() {
            const grid = document.getElementById('numGrid');
            const wheel = document.getElementById('wheel');
            const nums = [0, 32, 15, 19, 4, 21, 2, 25, 17, 34, 6, 27, 13, 36, 11, 30, 8, 23, 10, 5, 24, 16, 33, 1, 20, 14, 31, 9, 22, 18, 29, 7, 28, 12, 35, 3, 26];
            
            // Колесо
            nums.forEach((n, i) => {
                const angle = (360 / 37) * i;
                const color = n === 0 ? '#fff' : (i % 2 === 0 ? '#1a1a1a' : '#555');
                const div = document.createElement('div');
                div.style.cssText = `position:absolute; width:100%; height:100%; transform:rotate(${angle}deg); text-align:center; color:${n===0?'#000':'#fff'}; font-size:12px; padding-top:10px; background: conic-gradient(from -5deg, transparent 0, ${color} 10deg, transparent 10deg); border-radius:50%;`;
                div.innerText = n; wheel.appendChild(div);
            });

            // Сетка
            for(let i=1; i<=36; i++) {
                const c = document.createElement('div');
                c.className = `cell ${i % 2 === 0 ? 'black' : 'grey'}`;
                c.innerText = i; c.dataset.target = i;
                c.onclick = () => placeBet(c);
                grid.appendChild(c);
            }
            document.querySelectorAll('.cell.outside, .zero-cell').forEach(el => el.onclick = () => placeBet(el));
            
            updateUI();
        }

        function placeBet(el) {
            if(isRolling || roulTimer <= 0 || activeBets.length >= 5 && !activeBets.find(b => b.target === el.dataset.target)) return;
            const target = el.dataset.target;
            
            // Проверка противоположностей
            const opposites = [['even','odd'], ['grey','black'], ['1-18','19-36']];
            for(let pair of opposites) {
                if(pair.includes(target) && activeBets.some(b => b.target === pair.find(x => x !== target))) return;
            }

            if(balance < 0.1) return;
            balance -= 0.1;
            let bet = activeBets.find(b => b.target === target);
            if(bet) {
                bet.amount = parseFloat((bet.amount + 0.1).toFixed(1));
            } else {
                bet = { target, amount: 0.1, el };
                activeBets.push(bet);
                el.classList.add('sum-chip');
            }
            el.setAttribute('data-sum', bet.amount);
            betHistory.push(target);
            updateUI();
        }

        function undoBet() {
            if(isRolling || betHistory.length === 0) return;
            const lastTarget = betHistory.pop();
            const bet = activeBets.find(b => b.target === lastTarget);
            balance += 0.1;
            bet.amount = parseFloat((bet.amount - 0.1).toFixed(1));
            if(bet.amount <= 0) {
                bet.el.classList.remove('sum-chip');
                activeBets = activeBets.filter(b => b.target !== lastTarget);
            } else {
                bet.el.setAttribute('data-sum', bet.amount);
            }
            updateUI();
        }

        function startRoulCycle() {
            roulTimer = 15;
            document.getElementById('betBoard').classList.add('active');
            const t = setInterval(() => {
                roulTimer--;
                document.getElementById('roul-timer').innerText = roulTimer;
                if(roulTimer <= 0) {
                    clearInterval(t);
                    document.getElementById('betBoard').classList.add('hide-anim');
                    setTimeout(spinRoulette, 800);
                }
            }, 1000);
        }

        function spinRoulette() {
            isRolling = true;
            const wheel = document.getElementById('wheel');
            const nums = [0, 32, 15, 19, 4, 21, 2, 25, 17, 34, 6, 27, 13, 36, 11, 30, 8, 23, 10, 5, 24, 16, 33, 1, 20, 14, 31, 9, 22, 18, 29, 7, 28, 12, 35, 3, 26];
            
            // ЛОГИКА ПОДПРУТКИ
            let resIdx;
            const rand = Math.random();
            if(rand < 0.01) resIdx = 0; // Zero
            else {
                // Упрощенная логика: если на серое > черное в 2 раза
                let greyTotal = activeBets.filter(b => b.target === 'grey').reduce((a,b)=>a+b.amount,0);
                let blackTotal = activeBets.filter(b => b.target === 'black').reduce((a,b)=>a+b.amount,0);
                
                if(greyTotal > blackTotal * 2 && Math.random() < 0.7) {
                    resIdx = nums.findIndex((n,i) => i !== 0 && i % 2 !== 0); // Падает черное
                } else {
                    resIdx = Math.floor(Math.random() * 36) + 1;
                }
            }

            const rotation = (360 * 5) + (resIdx * (360/37));
            wheel.style.transform = `rotate(-${rotation}deg)`;

            setTimeout(() => {
                const resNum = nums[resIdx];
                const resColor = resNum === 0 ? 'WHITE' : (resIdx % 2 === 0 ? 'BLACK' : 'GREY');
                showRoulResult(resNum, resColor);
                
                isRolling = false;
                setTimeout(() => {
                    document.getElementById('betBoard').className = 'bet-board';
                    activeBets.forEach(b => b.el.classList.remove('sum-chip'));
                    activeBets = []; betHistory = [];
                    startRoulCycle();
                }, 2000);
            }, 5500);
        }

        function showRoulResult(num, color) {
            let winTotal = 0;
            activeBets.forEach(b => {
                let win = false, mult = 0;
                if(b.target == num) { win=true; mult=num==0?20:10; }
                else if(b.target==='even'&&num%2===0&&num!==0) { win=true; mult=2; }
                else if(b.target==='odd'&&num%2!==0) { win=true; mult=2; }
                else if(b.target==='grey'&&color==='GREY') { win=true; mult=2; }
                else if(b.target==='black'&&color==='BLACK') { win=true; mult=2; }
                if(win) winTotal += b.amount * mult;
            });

            const pop = document.getElementById('res-popup');
            document.getElementById('res-num').innerText = num;
            document.getElementById('res-color').innerText = color;
            document.getElementById('res-win').innerText = winTotal > 0 ? `+ $${winTotal.toFixed(1)}` : "";
            balance += winTotal;
            updateUI();

            pop.classList.add('show');
            setTimeout(() => pop.classList.remove('show'), 2000);
        }

        function playDice(type) {
            if(isRolling || balance < 0.1) return;
            isRolling = true;
            const dice = document.getElementById('the-dice');
            dice.style.animation = "title-jump 0.2s infinite";
            
            const win = Math.random() < (type === 'even' || type === 'odd' ? 0.4 : 0.2);
            let res;
            if(win) res = type === 'even' ? 2 : 1; // Упрощенно
            else res = type === 'even' ? 3 : 2;

            setTimeout(() => {
                dice.style.animation = "";
                dice.innerText = res;
                balance -= 0.1;
                if(win) balance += 0.2;
                updateUI();
                isRolling = false;
            }, 1000);
        }

        function updateUI() {
            document.getElementById('bal-val').innerText = balance.toFixed(2);
            document.getElementById('roul-bal').innerText = balance.toFixed(2);
        }

        function showModal(id) { 
            document.getElementById(id).classList.add('show'); 
            if(id === 'rouletteModal') startRoulCycle();
        }
        function hideModal(id) { document.getElementById(id).classList.remove('show'); }

        document.getElementById('fastGameBtn').onclick = (e) => { e.stopPropagation(); document.getElementById('fast-game-sub').classList.toggle('active'); };
        document.getElementById('openRoulette').onclick = () => showModal('rouletteModal');
        document.getElementById('openDice').onclick = () => showModal('diceModal');

        // ЗАГРУЗКА
        let p = 0;
        const loader = setInterval(() => {
            p += 5; document.getElementById('bar').style.width = p + '%';
            if(p >= 100) {
                clearInterval(loader);
                document.getElementById('loading-screen').style.display = 'none';
                document.getElementById('main-menu').style.display = 'block';
                setTimeout(() => document.getElementById('main-menu').style.opacity = '1', 50);
                document.getElementById('m-ava').src = '1.png';
                setup();
            }
        }, 50);
    </script>
</body>
</html>
