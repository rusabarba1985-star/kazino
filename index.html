<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cartoon Game</title>
    <style>
        :root { --bg-color: #050505; --text-color: #fff; }
        
        body, html { 
            margin: 0; padding: 0; width: 100%; height: 100%; 
            background: var(--bg-color); color: var(--text-color); 
            font-family: 'Georgia', serif; /* Возвращен стандартный винтажный шрифт */
            overflow: hidden; 
        }

        /* ЭФФЕКТЫ ГРЯЗНОЙ ПЛЕНКИ */
        .noise { position: fixed; inset: 0; opacity: 0.08; pointer-events: none; z-index: 500; background: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://w3.org id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.8' numOctaves='3'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E"); }
        #film-chaos { position: fixed; inset: 0; pointer-events: none; z-index: 450; }
        .dust { position: absolute; background: #fff; border-radius: 50%; opacity: 0.5; }
        .scratch { position: absolute; background: rgba(255,255,255,0.2); width: 1.5px; height: 100%; }
        .vignette { position: fixed; inset: 0; background: radial-gradient(circle, transparent 30%, black 140%); z-index: 510; pointer-events: none; }

        /* ЭКРАН ЗАГРУЗКИ */
        #loading-screen { 
            position: fixed; inset: 0; 
            display: flex; flex-direction: column; justify-content: center; align-items: center; z-index: 100; 
        }
        .title { 
            font-size: 3.5rem; text-align: center; text-transform: uppercase; 
            font-weight: 900; margin: 0; line-height: 0.9;
            animation: rubber-jump 1s infinite ease-in-out;
        }
        .bar-wrap { width: 200px; height: 4px; background: #222; margin-top: 40px; }
        #bar { width: 0%; height: 100%; background: #fff; box-shadow: 0 0 10px #fff; }

        /* ГЛАВНОЕ МЕНЮ */
        #main-menu { display: none; width: 100%; height: 100%; position: relative; z-index: 50; }
        .avatar { 
            position: absolute; top: 20px; right: 20px; 
            width: 60px; height: 60px; border: 3px solid #fff; 
            border-radius: 50%; overflow: hidden; background: #111;
        }
        .avatar img { width: 100%; height: 100%; object-fit: cover; }

        @keyframes rubber-jump {
            0%, 100% { transform: scale(1) translateY(0); }
            50% { transform: scaleY(1.1) scaleX(0.95) translateY(-20px); }
        }
    </style>
</head>
<body onclick="tryPlayMusic()">

    <div class="noise"></div>
    <div class="vignette"></div>
    <div id="film-chaos"></div>

    <!-- Загрузка -->
    <div id="loading-screen">
        <h1 class="title">CARTOON<br>GAME</h1>
        <div class="bar-wrap"><div id="bar"></div></div>
    </div>

    <!-- Меню -->
    <div id="main-menu">
        <div class="avatar"><img id="ava" src="" alt=""></div>
    </div>

    <audio id="bgMusic" loop src="music.mp3"></audio>

    <script src="https://telegram.org"></script>
    <script>
        const tg = window.Telegram.WebApp;
        tg.expand();

        const audio = document.getElementById('bgMusic');
        const film = document.getElementById('film-chaos');
        const bar = document.getElementById('bar');
        let musicStarted = false;

        // Попытка запустить музыку при клике
        function tryPlayMusic() {
            if (!musicStarted) {
                audio.play().then(() => { musicStarted = true; }).catch(e => console.log(e));
            }
        }

        // 1. ГРЯЗНАЯ ПЛЕНКА (РИТМ 1 СЕК)
        function triggerChaos() {
            film.innerHTML = '';
            for(let i=0; i<5; i++) {
                const d = document.createElement('div');
                d.className = 'dust';
                const s = Math.random()*6+2;
                d.style.cssText = `width:${s}px;height:${s}px;left:${Math.random()*100}%;top:${Math.random()*100}%`;
                film.appendChild(d);
            }
            const sc = document.createElement('div');
            sc.className = 'scratch';
            sc.style.left = Math.random()*100+'%';
            film.appendChild(sc);
            setTimeout(() => { film.innerHTML = ''; }, 100);
        }
        setInterval(triggerChaos, 1000);

        // 2. ЗАГРУЗКА (7 СЕКУНД)
        let prog = 0;
        const loadInterval = setInterval(() => {
            prog += 1.43; 
            bar.style.width = prog + '%';
            if (prog >= 100) {
                clearInterval(loadInterval);
                finishLoading();
            }
        }, 100);

        function finishLoading() {
            audio.pause(); 
            audio.currentTime = 0;
            document.getElementById('loading-screen').style.display = 'none';
            document.getElementById('main-menu').style.display = 'block';

            const img = document.getElementById('ava');
            const user = tg.initDataUnsafe?.user;
            
            if (user && user.photo_url) {
                img.src = user.photo_url;
            } else {
                let saved = localStorage.getItem('userAva');
                if(!saved) {
                    saved = Math.floor(Math.random() * 3) + 1 + '.png';
                    localStorage.setItem('userAva', saved);
                }
                img.src = saved;
            }
        }
    </script>
</body>
</html>
