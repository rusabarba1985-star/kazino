<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Cartoon Game - Multiplatform</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Luckiest+Guy&display=swap');

        :root { 
            --bg: #000; 
            --text: #fff; 
            --font-main: 'Luckiest Guy', cursive;
            --spring: cubic-bezier(0.68, -0.6, 0.32, 1.6);
            --soft-spring: cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        body, html { 
            margin: 0; padding: 0; width: 100%; height: 100%; 
            background: var(--bg); color: var(--text); 
            font-family: var(--font-main); overflow: hidden; user-select: none;
            touch-action: manipulation;
        }

        /* ЭФФЕКТЫ ПЛЕНКИ */
        .noise { position: fixed; inset: 0; opacity: 0.15; pointer-events: none; z-index: 500; background: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.8' numOctaves='3'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E"); }
        #film-chaos { position: fixed; inset: 0; pointer-events: none; z-index: 450; }
        .dust, .scratch { position: absolute; background: rgba(255,255,255,0.4); pointer-events: none; animation: fadeOut 0.8s forwards; }
        .scratch { width: 1px; height: 100%; opacity: 0.2; }
        @keyframes fadeOut { 0% { opacity: 0.5; } 100% { opacity: 0; } }
        .vignette { position: fixed; inset: 0; background: radial-gradient(circle, transparent 20%, black 150%); z-index: 510; pointer-events: none; }

        /* ЗАГРУЗКА */
        #loading-screen { 
            position: fixed; inset: 0; background: #000; 
            display: flex; flex-direction: column; justify-content: center; align-items: center; z-index: 1000;
        }
        .loading-title {
            font-size: 4rem; text-align: center; line-height: 0.8;
            animation: title-jump 0.8s infinite var(--spring);
            text-shadow: 6px 6px 0 #333;
        }
        @keyframes title-jump {
            0%, 100% { transform: scale(1) rotate(-3deg); }
            50% { transform: scale(1.1, 0.9) rotate(3deg); }
        }
        .loader-bar-container {
            width: 250px; height: 18px; border: 5px solid #fff;
            border-radius: 20px; margin-top: 40px; overflow: hidden; background: #222;
        }
        #bar { height: 100%; width: 0%; background: #fff; }

        /* ОСНОВНОЕ МЕНЮ */
        #main-menu { display: none; height: 100vh; position: relative; opacity: 0; transition: opacity 0.8s; z-index: 50; }
        
        .header { display: flex; justify-content: space-between; padding: 25px; align-items: center; }
        .balance-box { font-size: 2.5rem; text-shadow: 4px 4px 0 #333; }
        .avatar-box { 
            width: 80px; height: 80px; border: 6px solid #fff; 
            border-radius: 50%; overflow: hidden; cursor: pointer; 
            box-shadow: 5px 5px 0 #333; flex-shrink: 0;
        }
        .avatar-box img { width: 100%; height: 100%; object-fit: cover; }

        /* КНОПКИ */
        .btn-cartoon {
            background: #000; color: #fff; border: 5px solid #fff;
            padding: 12px 20px; font-family: var(--font-main); font-size: 1.2rem;
            border-radius: 20px; cursor: pointer; text-transform: uppercase;
            box-shadow: 0 6px 0 #333; transition: transform 0.2s var(--spring);
            text-align: center;
        }
        .btn-active { animation: btn-bounce 0.4s var(--spring); }
        @keyframes btn-bounce {
            0% { transform: scale(1); }
            40% { transform: scale(0.8) translateY(5px); }
            100% { transform: scale(1) translateY(0); }
        }

        /* ДИЗАЙН ДЛЯ ПК */
        @media (min-width: 1024px) {
            .menu-buttons-container {
                position: absolute; bottom: 50px; width: 100%;
                display: flex; justify-content: center; gap: 15px;
            }
            #fast-game-sub {
                position: absolute; bottom: 140px; left: 50%; transform: translateX(-50%) scale(0);
            }
        }

        /* ДИЗАЙН ДЛЯ ТЕЛЕФОНА */
        @media (max-width: 1023px) {
            .balance-box { font-size: 2rem; }
            .avatar-box { width: 70px; height: 70px; }
            .menu-buttons-container {
                position: absolute; bottom: 30px; width: 100%;
                display: flex; flex-direction: column; align-items: center; gap: 12px;
            }
            .btn-cartoon { width: 85%; max-width: 300px; }
            /* Выдвигается выше кнопок на телефоне */
            #fast-game-sub {
                position: absolute; bottom: 320px; left: 50%; transform: translateX(-50%) scale(0);
            }
        }

        #fast-game-sub {
            background: #000; border: 6px solid #fff; border-radius: 25px; padding: 15px;
            display: flex; gap: 15px; transition: transform 0.5s var(--spring); transform-origin: bottom;
            z-index: 60;
        }
        #fast-game-sub.active { transform: translateX(-50%) scale(1); }

        /* КРУГЛЫЕ ФИШКИ (ИСПРАВЛЕН ОВАЛ) */
        .chip-container { position: relative; width: 85px; height: 85px; display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
        .chip-main {
            width: 85px; height: 85px; background: #111; border-radius: 50%;
            border: 5px solid #fff; display: flex; align-items: center; justify-content: center; 
            cursor: pointer; z-index: 100; position: relative; aspect-ratio: 1/1;
        }
        .chip-main::after { content: ''; position: absolute; inset: 0; border: 10px dashed #fff; border-radius: 50%; }
        
        .sub-chips-wrapper { position: absolute; inset: 0; display: flex; align-items: center; justify-content: center; pointer-events: none; }
        .sub-chip {
            position: absolute; width: 65px; height: 65px; background: #222;
            border: 4px solid #fff; border-radius: 50%; display: flex;
            align-items: center; justify-content: center; font-size: 0.9rem;
            opacity: 0; transition: all 0.6s var(--spring);
            transform: translate(0, 0) scale(0); 
            z-index: 50; pointer-events: none; aspect-ratio: 1/1;
        }
        .sub-chip::after { content: ''; position: absolute; inset: 0; border: 6px dashed #fff; border-radius: 50%; }
        .active .sub-chip { opacity: 1; pointer-events: auto; }

        /* DICE MODAL */
        .modal { 
            position: fixed; inset: 0; background: rgba(0,0,0,0.96); 
            display: none; justify-content: center; align-items: center; z-index: 800; 
        }
        .modal.show { display: flex; }
        .modal-content { 
            background: #000; border: 8px solid #fff; border-radius: 50px; 
            width: 90%; max-width: 400px; padding: 40px 15px; text-align: center;
            transform: scale(0.7); transition: transform 0.6s var(--spring);
        }
        .modal.show .modal-content { transform: scale(1); }

        .dice-area { display: flex; align-items: center; justify-content: space-around; margin: 35px 0; }
        #the-dice { 
            width: 100px; height: 100px; background: #fff; border-radius: 20px; 
            border: 6px solid #000; color: #000; font-size: 4rem; 
            display: flex; align-items: center; justify-content: center;
            box-shadow: 0 10px 0 #ccc; flex-shrink: 0;
        }
        .dice-anim { animation: dice-toss 1s var(--soft-spring); }
        @keyframes dice-toss {
            0% { transform: translateY(0) rotate(0); }
            30% { transform: translateY(-160px) rotate(180deg) scale(1.2); }
            60% { transform: translateY(15px) rotate(300deg) scale(0.9, 1.1); }
            100% { transform: translateY(0) rotate(360deg) scale(1); }
        }

        .bets-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px; margin: 25px 0; }
        .bet-btn { 
            background: #000; border: 3px solid #fff; color: #fff; 
            padding: 12px 0; border-radius: 18px; font-family: var(--font-main); 
            cursor: pointer; font-size: 1rem;
        }
        .bet-btn.selected { background: #fff; color: #000; }

        /* РЕЗУЛЬТАТ */
        #res-pop {
            position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%) scale(0);
            background: #fff; border: 10px solid #000; border-radius: 40px;
            padding: 30px; z-index: 2000; text-align: center; color: #000;
            transition: transform 0.6s var(--spring); width: 280px; pointer-events: none;
        }
        #res-pop.show { transform: translate(-50%, -50%) scale(1); pointer-events: auto; }
        #res-pop img { width: 160px; height: 160px; border: 6px solid #000; border-radius: 20px; object-fit: cover; margin-bottom: 20px; }
    </style>
</head>
<body onclick="initAudio()">

    <div class="noise"></div>
    <div class="vignette"></div>
    <div id="film-chaos"></div>

    <audio id="music1" loop preload="auto"><source src="music.mp3" type="audio/mpeg"></audio>
    <audio id="music2" loop preload="auto"><source src="music2.mp3" type="audio/mpeg"></audio>

    <!-- LOADING -->
    <div id="loading-screen">
        <div class="loading-title">CARTOON<br>GAME</div>
        <div class="loader-bar-container"><div id="bar"></div></div>
        <div style="margin-top: 15px; letter-spacing: 4px; font-size: 1rem;">LOADING...</div>
    </div>

    <!-- MAIN MENU -->
    <div id="main-menu">
        <div class="header">
            <div class="balance-box">$<span id="bal-val">1000</span></div>
            <div class="avatar-box" id="avaBtn"><img id="m-ava" src="" alt="ava"></div>
        </div>

        <div id="fast-game-sub">
            <button class="btn-cartoon" style="width: auto; font-size: 0.9rem;">ROULETTE</button>
            <button class="btn-cartoon" style="width: auto; font-size: 0.9rem;" id="openDice">DICE</button>
        </div>

        <div class="menu-buttons-container">
            <button class="btn-cartoon" id="fastGameBtn">FAST GAME</button>
            <button class="btn-cartoon">SLOTS</button>
            <button class="btn-cartoon">BONUS</button>
            <button class="btn-cartoon" id="statBtn">STAT</button>
            <button class="btn-cartoon">FIGHT</button>
        </div>
    </div>

    <!-- DICE MODAL -->
    <div id="diceModal" class="modal">
        <div class="modal-content">
            <h2 style="margin:0; font-size: 2.2rem;">LUCKY DICE</h2>
            
            <div class="dice-area">
                <div id="the-dice">?</div>
                
                <div class="chip-container">
                    <div class="chip-main" id="mainChip"><span>$0.1</span></div>
                    <div class="sub-chips-wrapper" id="radialChips">
                        <div class="sub-chip" data-val="0.1">$0.1</div>
                        <div class="sub-chip" data-val="0.5">$0.5</div>
                        <div class="sub-chip" data-val="1">$1</div>
                        <div class="sub-chip" data-val="5">$5</div>
                        <div class="sub-chip" data-val="10">$10</div>
                    </div>
                </div>
            </div>

            <div class="bets-grid">
                <button class="bet-btn" data-bet="even">EVEN</button>
                <button class="bet-btn" data-bet="odd">ODD</button>
                <button class="bet-btn" data-bet="1">1</button>
                <button class="bet-btn" data-bet="2">2</button>
                <button class="bet-btn" data-bet="3">3</button>
                <button class="bet-btn" data-bet="4">4</button>
                <button class="bet-btn" data-bet="5">5</button>
                <button class="bet-btn" data-bet="6">6</button>
            </div>
            
            <button class="btn-cartoon" style="width: 100%" onclick="hideModal('diceModal')">LEAVE</button>
        </div>
    </div>

    <!-- STAT MODAL -->
    <div id="statModal" class="modal">
        <div class="modal-content">
            <h2 style="font-size: 2.2rem;">STATISTICS</h2>
            <div style="text-align: left; padding: 25px; font-size: 1.5rem;">
                <p>GAMES: <span id="s-games" style="float:right">0</span></p>
                <p>DEPOSITS: <span style="float:right">$0</span></p>
                <p>WITHDRAWS: <span style="float:right">$0</span></p>
            </div>
            <button class="btn-cartoon" style="width: 100%" onclick="hideModal('statModal')">CLOSE</button>
        </div>
    </div>

    <!-- RESULT POPUP -->
    <div id="res-pop">
        <img id="res-img" src="" alt="">
        <div id="res-txt" style="font-size: 2rem;">YOU WIN!</div>
    </div>

    <script>
        let balance = 1000;
        let gamesCount = 0;
        let betValue = 0.1;
        let selectedBet = null;
        let isRolling = false;
        let audioStarted = false;

        const m1 = document.getElementById('music1');
        const m2 = document.getElementById('music2');

        function initAudio() {
            if (!audioStarted) {
                m1.volume = 0.4; m2.volume = 0.4;
                m1.play().catch(() => {});
                audioStarted = true;
            }
        }

        function switchMusic() { m1.pause(); m2.play().catch(() => {}); }

        document.querySelectorAll('.btn-cartoon, .bet-btn').forEach(btn => {
            btn.addEventListener('click', function() {
                this.classList.remove('btn-active');
                void this.offsetWidth;
                this.classList.add('btn-active');
            });
        });

        setInterval(() => {
            const container = document.getElementById('film-chaos');
            const d = document.createElement('div');
            d.className = Math.random() > 0.8 ? 'scratch' : 'dust';
            if (d.className === 'dust') {
                const s = Math.random() * 5 + 2;
                d.style.cssText = `width:${s}px;height:${s}px;left:${Math.random()*100}%;top:${Math.random()*100}%;position:absolute;`;
            } else { d.style.left = Math.random()*100+'%'; }
            container.appendChild(d);
            setTimeout(() => d.remove(), 800);
        }, 200);

        function init() {
            const ava = localStorage.getItem('userAva') || '1.png';
            document.getElementById('m-ava').src = ava;
            updateUI();
        }

        function updateUI() {
            document.getElementById('bal-val').innerText = balance.toFixed(2);
            document.getElementById('s-games').innerText = gamesCount;
        }

        // КРУГЛЫЕ ФИШКИ - ВЫЛЕТ ИЗ ЦЕНТРА
        const mainChip = document.getElementById('mainChip');
        const radial = document.getElementById('radialChips');
        
        mainChip.onclick = (e) => {
            if(isRolling) return;
            e.stopPropagation();
            const active = radial.classList.toggle('active');
            const chips = radial.querySelectorAll('.sub-chip');
            if(active) {
                chips.forEach((c, i) => {
                    const angle = (i * 40) - 120;
                    const x = Math.cos(angle * Math.PI / 180) * 125;
                    const y = Math.sin(angle * Math.PI / 180) * 125;
                    c.style.transform = `translate(${x}px, ${y}px) scale(1)`;
                });
            } else {
                chips.forEach(c => c.style.transform = 'translate(0,0) scale(0)');
            }
        };

        radial.querySelectorAll('.sub-chip').forEach(sc => {
            sc.onclick = (e) => {
                e.stopPropagation();
                betValue = parseFloat(sc.dataset.val);
                mainChip.querySelector('span').innerText = '$' + betValue;
                radial.classList.remove('active');
                radial.querySelectorAll('.sub-chip').forEach(c => c.style.transform = 'translate(0,0) scale(0)');
            };
        });

        // DICE LOGIC
        const bBtns = document.querySelectorAll('.bet-btn');
        bBtns.forEach(b => {
            b.onclick = () => {
                if(isRolling) return;
                bBtns.forEach(x => x.classList.remove('selected'));
                b.classList.add('selected');
                selectedBet = b.dataset.bet;
                startDice();
            };
        });

        function startDice() {
            if(balance < betValue) return alert("NOT ENOUGH $");
            isRolling = true;
            const dice = document.getElementById('the-dice');
            dice.classList.add('dice-anim');

            const isNum = !isNaN(selectedBet);
            const winProb = isNum ? 0.20 : 0.40;
            const win = Math.random() < winProb;

            let finalRes;
            if(win) {
                if(selectedBet === 'even') finalRes = [2,4,6][Math.floor(Math.random()*3)];
                else if(selectedBet === 'odd') finalRes = [1,3,5][Math.floor(Math.random()*3)];
                else finalRes = parseInt(selectedBet);
            } else {
                do { finalRes = Math.floor(Math.random()*6)+1; } 
                while( (selectedBet === 'even' && finalRes % 2 === 0) || (selectedBet === 'odd' && finalRes % 2 !== 0) || (selectedBet == finalRes) );
            }

            let tc = 0;
            const t = setInterval(() => { dice.innerText = Math.floor(Math.random()*6)+1; tc++; if(tc > 10) clearInterval(t); }, 80);

            setTimeout(() => {
                dice.classList.remove('dice-anim');
                dice.innerText = finalRes;
                setTimeout(() => {
                    balance -= betValue;
                    gamesCount++;
                    if(win) {
                        const winAmt = betValue * (isNum ? 3.5 : 2.0);
                        balance += winAmt;
                        showResult(true, winAmt.toFixed(1) + "$");
                    } else { showResult(false); }
                    updateUI();
                }, 600);
            }, 1000);
        }

        function showResult(win, val = "") {
            const pop = document.getElementById('res-pop');
            const img = document.getElementById('res-img');
            const txt = document.getElementById('res-txt');
            if(win) { img.src = "Dicewin.gif"; txt.innerText = "YOU WIN " + val; } 
            else { 
                img.src = "Dicelose.gif"; 
                const msgs = ["Nice try", "No luck", "Luck next time", "Not your day"];
                txt.innerText = msgs[Math.floor(Math.random()*msgs.length)];
            }
            pop.classList.add('show');
            setTimeout(() => {
                pop.classList.remove('show');
                isRolling = false;
                selectedBet = null;
                bBtns.forEach(x => x.classList.remove('selected'));
            }, 2500);
        }

        function showModal(id) { document.getElementById(id).classList.add('show'); }
        function hideModal(id) { if(isRolling) return; document.getElementById(id).classList.remove('show'); }

        document.getElementById('fastGameBtn').onclick = (e) => { e.stopPropagation(); document.getElementById('fast-game-sub').classList.toggle('active'); };
        document.getElementById('openDice').onclick = () => showModal('diceModal');
        document.getElementById('statBtn').onclick = () => showModal('statModal');
        document.getElementById('avaBtn').onclick = () => {
            let cur = parseInt(localStorage.getItem('userAva')) || 1;
            cur = cur >= 5 ? 1 : cur + 1;
            localStorage.setItem('userAva', cur + '.png');
            init();
        };

        window.onclick = () => { document.getElementById('fast-game-sub').classList.remove('active'); radial.classList.remove('active'); };

        let progress = 0;
        const loader = setInterval(() => {
            progress += 2;
            document.getElementById('bar').style.width = progress + '%';
            if(progress >= 100) {
                clearInterval(loader);
                switchMusic();
                document.getElementById('loading-screen').style.display = 'none';
                document.getElementById('main-menu').style.display = 'block';
                setTimeout(() => document.getElementById('main-menu').style.opacity = '1', 50);
                init();
            }
        }, 50);

    </script>
</body>
</html>
