<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cartoon Game</title>
    <!-- Подключаем шрифт в стиле Rubber Hose (Bungee или Limelight) -->
    <link href="https://googleapis.com" rel="stylesheet">
    <style>
        :root { --bg-color: #050505; --text-color: #fff; }
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; background: var(--bg-color); color: var(--text-color); font-family: 'Limelight', cursive; overflow: hidden; }

        /* ЭКРАН ЗАГРУЗКИ */
        #loading-screen { position: fixed; inset: 0; display: flex; flex-direction: column; justify-content: center; align-items: center; z-index: 1000; }
        .title { font-size: 3rem; text-align: center; text-transform: uppercase; animation: rubber-beat 1s infinite ease-in-out; line-height: 1; }
        .progress-container { width: 60%; height: 4px; background: #222; margin-top: 30px; position: relative; }
        #progress-bar { width: 0%; height: 100%; background: #fff; transition: width 0.3s linear; }

        /* ЭФФЕКТЫ ПЛЕНКИ */
        .noise { position: fixed; inset: 0; opacity: 0.08; pointer-events: none; z-index: 150; background: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://w3.org id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.8' numOctaves='3'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E"); }
        #film-effects { position: fixed; inset: 0; pointer-events: none; z-index: 160; }
        .dust-spot { position: absolute; background: #fff; border-radius: 50%; opacity: 0.5; }
        .film-scratch { position: absolute; background: rgba(255,255,255,0.2); width: 1.5px; height: 100%; }

        /* ГЛАВНОЕ МЕНЮ */
        #main-menu { display: none; width: 100%; height: 100%; position: relative; }
        .avatar-container { position: absolute; top: 20px; right: 20px; width: 60px; height: 60px; border: 3px solid #fff; border-radius: 50%; overflow: hidden; background: #222; }
        .avatar-container img { width: 100%; height: 100%; object-fit: cover; }

        @keyframes rubber-beat {
            0%, 100% { transform: scale(1) translateY(0); }
            50% { transform: scaleY(1.1) scaleX(0.95) translateY(-15px); }
        }
    </style>
</head>
<body>

    <div class="noise"></div>
    <div id="film-effects"></div>

    <!-- Загрузка -->
    <div id="loading-screen">
        <h1 class="title">Cartoon<br>Game</h1>
        <div class="progress-container"><div id="progress-bar"></div></div>
    </div>

    <!-- Меню -->
    <div id="main-menu">
        <div class="avatar-container">
            <img id="user-avatar" src="" alt="Avatar">
        </div>
    </div>

    <audio id="bgMusic" loop src="music.mp3"></audio>

    <script src="https://telegram.org"></script>
    <script>
        const tg = window.Telegram.WebApp;
        tg.expand();

        const progressBar = document.getElementById('progress-bar');
        const loadingScreen = document.getElementById('loading-screen');
        const mainMenu = document.getElementById('main-menu');
        const music = document.getElementById('bgMusic');
        const avatarImg = document.getElementById('user-avatar');

        // 1. Работа с аватаркой
        function setupAvatar() {
            const user = tg.initDataUnsafe?.user;
            if (user && user.photo_url) {
                avatarImg.src = user.photo_url;
            } else {
                // Если нет авы, берем рандомную 1-3.png
                const rand = Math.floor(Math.random() * 3) + 1;
                avatarImg.src = `${rand}.png`;
            }
        }

        // 2. Логика загрузки (минимум 7 секунд)
        let progress = 0;
        const loadTime = 7000; // 7 секунд
        const intervalTime = 100;
        const step = 100 / (loadTime / intervalTime);

        // Музыка стартует при первом взаимодействии или сразу, если разрешит браузер
        document.body.onclick = () => music.play();

        const loadingInterval = setInterval(() => {
            progress += step;
            progressBar.style.width = progress + '%';

            if (progress >= 100) {
                clearInterval(loadingInterval);
                finishLoading();
            }
        }, intervalTime);

        function finishLoading() {
            music.pause();
            music.currentTime = 0;
            loadingScreen.style.display = 'none';
            mainMenu.style.display = 'block';
            setupAvatar();
        }

        // 3. Ритмичные дефекты пленки (каждую секунду)
        function triggerFlash() {
            const container = document.getElementById('film-effects');
            container.innerHTML = '';
            for(let i=0; i<4; i++) {
                const dust = document.createElement('div');
                dust.className = 'dust-spot';
                const s = Math.random()*5+2;
                dust.style.cssText = `width:${s}px;height:${s}px;left:${Math.random()*100}%;top:${Math.random()*100}%`;
                container.appendChild(dust);
            }
            const sc = document.createElement('div');
            sc.className = 'film-scratch';
            sc.style.left = Math.random()*100+'%';
            container.appendChild(sc);
            setTimeout(() => container.innerHTML = '', 100);
        }
        setInterval(triggerFlash, 1000);
    </script>
</body>
</html>
