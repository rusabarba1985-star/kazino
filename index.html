<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
    <meta http-equiv="Pragma" content="no-cache">
    <meta http-equiv="Expires" content="0">
    
    <title>Cartoon Game - Rubber Hose Style</title>
    
    <style>
        :root { --bg-color: #050505; --text-color: #fff; }
        
        body, html { 
            margin: 0; padding: 0; width: 100%; height: 100%; 
            background: var(--bg-color); color: var(--text-color); 
            font-family: 'Georgia', serif;
            overflow: hidden; 
        }

        .noise { 
            position: fixed; inset: 0; opacity: 0.08; pointer-events: none; z-index: 500; 
            background: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://w3.org'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.8' numOctaves='3'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E"); 
        }
        
        #film-chaos { position: fixed; inset: 0; pointer-events: none; z-index: 450; }
        .dust { position: absolute; background: #fff; border-radius: 50%; opacity: 0.5; }
        .scratch { position: absolute; background: rgba(255,255,255,0.2); width: 1.5px; height: 100%; }
        .vignette { position: fixed; inset: 0; background: radial-gradient(circle, transparent 30%, black 140%); z-index: 510; pointer-events: none; }

        #loading-screen { 
            position: fixed; inset: 0; 
            display: flex; flex-direction: column; justify-content: center; align-items: center; z-index: 100; 
            background: #050505;
        }
        
        .title { 
            font-size: 3.5rem; text-align: center; text-transform: uppercase; 
            font-weight: 900; margin: 0; line-height: 0.9;
            animation: rubber-jump 1s infinite ease-in-out;
            color: white;
            text-shadow: 4px 4px 0px #3a3a3a;
        }
        
        .bar-wrap { width: 200px; height: 4px; background: #222; margin-top: 40px; }
        #bar { width: 0%; height: 100%; background: #fff; box-shadow: 0 0 10px #fff; transition: width 0.1s linear; }

        #main-menu { display: none; width: 100%; height: 100%; position: relative; z-index: 50; }
        .avatar { 
            position: absolute; top: 20px; right: 20px; 
            width: 60px; height: 60px; border: 3px solid #fff; 
            border-radius: 50%; overflow: hidden; background: #111;
        }
        .avatar img { width: 100%; height: 100%; object-fit: cover; }

        @keyframes rubber-jump {
            0%, 100% { transform: scale(1) translateY(0); }
            50% { transform: scaleY(1.1) scaleX(0.95) translateY(-20px); }
        }
        
        .version {
            position: fixed;
            bottom: 5px;
            right: 5px;
            font-size: 10px;
            color: rgba(255,255,255,0.3);
            z-index: 600;
            font-family: monospace;
        }
    </style>
</head>
<body>

    <div class="noise"></div>
    <div class="vignette"></div>
    <div id="film-chaos"></div>

    <div id="loading-screen">
        <h1 class="title">CARTOON<br>GAME</h1>
        <div class="bar-wrap"><div id="bar"></div></div>
        <div class="version">v1.0.3</div>
    </div>

    <div id="main-menu">
        <div class="avatar"><img id="ava" src="" alt=""></div>
        <div class="version">v1.0.3</div>
    </div>

    <audio id="bgMusic" loop preload="auto">
        <source src="music.mp3" type="audio/mpeg">
        Ваш браузер не поддерживает аудио.
    </audio>

    <script>
        (function() {
            console.log('App version: 1.0.3 - ' + new Date().toISOString());
            
            const currentVersion = '1.0.3';
            const storedVersion = localStorage.getItem('app_version');
            
            if (storedVersion !== currentVersion) {
                console.log('New version detected!');
                localStorage.setItem('app_version', currentVersion);
            }
        })();
        
        // Telegram WebApp
        let tg = null;
        try {
            if (window.Telegram?.WebApp) {
                tg = window.Telegram.WebApp;
                tg.expand();
            }
        } catch(e) {}
        
        const audio = document.getElementById('bgMusic');
        const film = document.getElementById('film-chaos');
        const bar = document.getElementById('bar');
        let musicStarted = false;
        
        // Функция для запуска музыки
        function tryPlayMusic() {
            if (!musicStarted) {
                audio.play().then(() => {
                    musicStarted = true;
                    console.log('🎵 Music started playing');
                }).catch(e => {
                    console.log('Autoplay blocked, waiting for user interaction');
                    // Если автовоспроизведение заблокировано, ждем клика
                });
            }
        }
        
        // Пытаемся запустить музыку сразу (если разрешено)
        tryPlayMusic();
        
        // Запускаем музыку при любом клике/тапе (на случай блокировки автовоспроизведения)
        document.body.addEventListener('click', tryPlayMusic);
        document.body.addEventListener('touchstart', tryPlayMusic);
        
        // Эффекты грязной пленки
        function triggerChaos() {
            film.innerHTML = '';
            for(let i = 0; i < 5; i++) {
                const d = document.createElement('div');
                d.className = 'dust';
                const s = Math.random() * 6 + 2;
                d.style.cssText = `width:${s}px;height:${s}px;left:${Math.random() * 100}%;top:${Math.random() * 100}%;background:#aaa;`;
                film.appendChild(d);
            }
            const sc = document.createElement('div');
            sc.className = 'scratch';
            sc.style.left = Math.random() * 100 + '%';
            film.appendChild(sc);
            setTimeout(() => { if(film.children.length > 10) film.innerHTML = ''; }, 100);
        }
        setInterval(triggerChaos, 1000);
        
        // Дополнительный эффект мерцания пленки
        setInterval(() => {
            if (Math.random() > 0.7) {
                const flicker = document.createElement('div');
                flicker.style.cssText = `
                    position: fixed;
                    inset: 0;
                    background: rgba(255,255,255,0.05);
                    pointer-events: none;
                    z-index: 520;
                `;
                document.body.appendChild(flicker);
                setTimeout(() => flicker.remove(), 50);
            }
        }, 200);
        
        // Загрузка (7 секунд)
        let prog = 0;
        const loadInterval = setInterval(() => {
            prog += 1.43;
            bar.style.width = Math.min(prog, 100) + '%';
            if (prog >= 100) {
                clearInterval(loadInterval);
                finishLoading();
            }
        }, 100);
        
        function finishLoading() {
            document.getElementById('loading-screen').style.display = 'none';
            document.getElementById('main-menu').style.display = 'block';
            
            const img = document.getElementById('ava');
            let user = null;
            
            try {
                if (tg?.initDataUnsafe?.user) {
                    user = tg.initDataUnsafe.user;
                }
            } catch(e) {}
            
            if (user && user.photo_url) {
                img.src = user.photo_url;
            } else {
                // Рисуем мультяшную аватарку в стиле Rubber Hose
                const canvas = document.createElement('canvas');
                canvas.width = 60;
                canvas.height = 60;
                const ctx = canvas.getContext('2d');
                
                // Лицо
                ctx.fillStyle = '#FFD966';
                ctx.beginPath();
                ctx.arc(30, 30, 28, 0, Math.PI * 2);
                ctx.fill();
                
                // Белки глаз
                ctx.fillStyle = '#fff';
                ctx.beginPath();
                ctx.arc(18, 22, 6, 0, Math.PI * 2);
                ctx.fill();
                ctx.beginPath();
                ctx.arc(42, 22, 6, 0, Math.PI * 2);
                ctx.fill();
                
                // Рот (широкая улыбка в стиле Rubber Hose)
                ctx.fillStyle = '#663300';
                ctx.beginPath();
                ctx.arc(30, 38, 12, 0, Math.PI);
                ctx.fill();
                
                // Зрачки
                ctx.fillStyle = '#000';
                ctx.beginPath();
                ctx.arc(16, 20, 2, 0, Math.PI * 2);
                ctx.fill();
                ctx.beginPath();
                ctx.arc(40, 20, 2, 0, Math.PI * 2);
                ctx.fill();
                
                // Брови (удивленные)
                ctx.beginPath();
                ctx.moveTo(10, 14);
                ctx.quadraticCurveTo(18, 10, 26, 14);
                ctx.strokeStyle = '#4a2a00';
                ctx.lineWidth = 2;
                ctx.stroke();
                
                ctx.beginPath();
                ctx.moveTo(34, 14);
                ctx.quadraticCurveTo(42, 10, 50, 14);
                ctx.stroke();
                
                img.src = canvas.toDataURL();
            }
        }
        
        console.log('App loaded! Version: 1.0.3 | Music file: music.mp3');
        
        // Обработка ошибок загрузки музыки
        audio.addEventListener('error', (e) => {
            console.error('Music loading error:', e);
            console.log('Please make sure music.mp3 file exists in the same folder');
        });
        
        audio.addEventListener('canplaythrough', () => {
            console.log('Music file loaded successfully');
        });
    </script>
</body>
</html>
