<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cuphead Style Loading</title>
    <style>
        :root {
            --bg-color: #0a0a0a;
            --text-color: #f0f0f0;
        }

        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            background-color: var(--bg-color);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            overflow: hidden;
            font-family: "Courier New", Courier, monospace;
        }

        /* Эффект старой кинопленки (зерно) */
        .noise {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: url('https://wikimedia.org');
            opacity: 0.05;
            pointer-events: none;
            z-index: 100;
            animation: noise-anim 0.2s infinite;
        }

        /* Контейнер для текста */
        .loading-container {
            position: relative;
            text-align: center;
            z-index: 10;
        }

        .title {
            color: var(--text-color);
            font-size: 3.5rem;
            font-weight: 900;
            text-transform: uppercase;
            margin: 0;
            /* Эффект Rubber Hose: покачивание и растяжение */
            animation: rubber-hose-text 0.6s infinite ease-in-out alternate;
            filter: drop-shadow(2px 2px 0px #333);
        }

        .status {
            color: #888;
            font-size: 1rem;
            margin-top: 20px;
            letter-spacing: 5px;
            animation: blink 0.4s infinite;
        }

        /* Полоски (царапины) как в Cuphead */
        .scratch {
            position: absolute;
            top: 0;
            width: 2px;
            height: 100%;
            background: rgba(255, 255, 255, 0.1);
            animation: scratch-move 0.3s infinite;
        }

        /* АНИМАЦИИ */
        @keyframes rubber-hose-text {
            0% { transform: scaleY(1) scaleX(1) translateY(0); }
            100% { transform: scaleY(1.1) scaleX(0.95) translateY(-10px); }
        }

        @keyframes noise-anim {
            0% { background-position: 0 0; }
            100% { background-position: 100px 100px; }
        }

        @keyframes scratch-move {
            0% { left: 20%; opacity: 0; }
            50% { opacity: 0.3; }
            100% { left: 22%; opacity: 0; }
        }

        @keyframes blink {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.3; }
        }

        /* Мерцание экрана (старый проектор) */
        .flicker {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: rgba(255, 255, 255, 0.02);
            pointer-events: none;
            z-index: 90;
            animation: flicker-anim 0.1s infinite;
        }

        @keyframes flicker-anim {
            0% { opacity: 0.1; }
            50% { opacity: 0.2; }
            100% { opacity: 0.1; }
        }

        .vignette {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: radial-gradient(circle, transparent 40%, black 150%);
            z-index: 110;
            pointer-events: none;
        }
    </style>
</head>
<body>

    <div class="noise"></div>
    <div class="flicker"></div>
    <div class="vignette"></div>
    <div class="scratch" style="left: 30%; animation-duration: 0.5s;"></div>
    <div class="scratch" style="left: 70%; animation-duration: 0.8s; width: 1px;"></div>

    <div class="loading-container">
        <h1 class="title">Cartoon<br>Game</h1>
        <div class="status">LOADING...</div>
    </div>

    <script src="https://telegram.org"></script>
    <script>
        window.Telegram.WebApp.expand();
        window.Telegram.WebApp.headerColor = '#000000';
    </script>
</body>
</html>
