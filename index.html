<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cartoon Game</title>
    <style>
        /* Основной стиль экрана */
        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            background-color: #000;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
            font-family: 'Courier New', Courier, monospace;
        }

        /* Контейнер для эффектов */
        .screen {
            position: relative;
            width: 100%;
            height: 100%;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        /* Текст в стиле Rubber Hose */
        .title {
            color: #fff;
            font-size: 3rem;
            font-weight: 900;
            text-transform: uppercase;
            text-align: center;
            z-index: 10;
            user-select: none;
            /* Дрожание текста */
            animation: jitter 0.15s infinite;
            letter-spacing: 2px;
        }

        /* Анимированные полоски (царапины на пленке) */
        .film-scratch {
            position: absolute;
            top: 0;
            width: 1px;
            height: 100%;
            background: rgba(128, 128, 128, 0.3);
            z-index: 5;
            pointer-events: none;
        }

        /* Стили для каждой полоски с разной задержкой */
        .scratch-1 { left: 20%; animation: scratch-move 0.8s infinite linear; }
        .scratch-2 { left: 50%; animation: scratch-move 1.2s infinite linear; opacity: 0.5; }
        .scratch-3 { left: 85%; animation: scratch-move 0.5s infinite linear; }

        /* Анимация падения полосок */
        @keyframes scratch-move {
            0% { transform: translateY(-100%); }
            100% { transform: translateY(100%); }
        }

        /* Эффект дрожания кадра */
        @keyframes jitter {
            0% { transform: translate(0,0); }
            25% { transform: translate(-1px, 1px); }
            50% { transform: translate(1px, -1px); }
            75% { transform: translate(-1px, -1px); }
            100% { transform: translate(1px, 1px); }
        }

        /* Эффект виньетки и шума */
        .overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: radial-gradient(circle, transparent 50%, black 120%);
            pointer-events: none;
            z-index: 20;
        }
    </style>
</head>
<body>

    <div class="screen">
        <div class="overlay"></div>
        
        <!-- Полоски пленки -->
        <div class="film-scratch scratch-1"></div>
        <div class="film-scratch scratch-2"></div>
        <div class="film-scratch scratch-3"></div>

        <h1 class="title">Cartoon<br>Game</h1>
    </div>

    <!-- Подключение Telegram Web App SDK -->
    <script src="https://telegram.org"></script>
    <script>
        const tg = window.Telegram.WebApp;
        tg.expand(); // Расширить на весь экран
        tg.headerColor = '#000000';
    </script>
</body>
</html>
